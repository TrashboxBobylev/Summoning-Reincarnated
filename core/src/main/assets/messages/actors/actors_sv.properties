actors.mobs.npcs.blacksmith.intro_quest_start=Vill du gĂ¶ra nytta? Ja, jag har nĂĄgot du kan gĂ¶ra. Jag har byggt den hĂ¤r verkstaden ovanpĂĄ en gammal gruva, den ligger precis nedfĂ¶r stegen. Ta den hĂ¤r hackan och bryt lite mĂ¶rkt guldmalm ĂĄt mig. 40 stycken borde rĂ¤cka. Berget dĂ¤r nere Ă¤r mjukt, sĂĄ du borde kunna bryta dig igenom vĂ¤ggarna med lite anstrĂ¤ngning._\n\nVad menar du med hur jag ska betala? Din giriga...\n\nOkej, okej, jag kan smida ĂĄt dig. Du kan skatta dig lycklig, jag Ă¤r den enda smeden i trakten.
actors.mobs.npcs.blacksmith.intro_quest_crystal=Var fĂ¶rsiktig, gruvan Ă¤r farlig fĂ¶r en liten mĂ¤nniska som du. Den har varit Ă¶vergiven vid och en massa kristaller har bĂ¶rjat vĂ¤xa. De Ă¤r glĂ¤nsande, men fĂ¶r Ă¶mtĂĄliga fĂ¶r att vara vĂ¤rda nĂĄgot, och de har magiska saker som skyddar dem. De Ă¤r ganska starka, sĂĄ var fĂ¶rsiktig nĂ¤r du grĂ¤ver, annars kommer de att observera dig. Det finns ocksĂĄ en gigantisk kristall nĂĄgonstans. Den Ă¤r mycket hĂĄrdare, sĂĄ var beredd pĂĄ en kamp om du bĂ¶rjar bryta den. Jag slĂĄr vad om att om du krossar den kommer det att bromsa kristallernas tillvĂ¤xt, sĂĄ jag betalar extra om du klarar det.
actors.mobs.npcs.blacksmith.intro_quest_gnoll=Var fĂ¶rsiktig, gruvan Ă¤r farlig fĂ¶r en liten mĂ¤nniska som du. NĂĄgra gnoller vill ocksĂĄ ha guldet och nu fĂ¶rstĂ¶r de stĂ¤llet. De Ă¤r dumma varelser, sĂĄ deras gruvdrift har orsakat alla mĂ¶jliga ras och instĂ¤llningar. Du mĂĄste grĂ¤va dig igenom det, sĂĄ leta efter nyligen rĂ¶rda stenar. Jag tror att en av gnollerna orsakar det mesta av problemen, antagligen en geomancer-shaman eller nĂĄgot liknande. Jag betalar extra om du kan hitta och dĂ¶da den, men jag Ă¤r sĂ¤ker pĂĄ att den kommer att slĂĄ tillbaka.
actors.mobs.npcs.blacksmith.intro_quest_fungi=Var fĂ¶rsiktig, gruvan Ă¤r farlig fĂ¶r en liten mĂ¤nniska som du. Det finns nĂĄgon sorts svampmonster som har vuxit dĂ¤r nere. Det har svampvakter som Ă¤r dĂ¶dliga om de ser dig, men de kan ĂĄtminstone inte resa sig och jaga dig. HĂĄll dig utom synhĂĄll om du vill Ă¶verleva. Jag betalar extra om du lyckas dĂ¶da den stĂ¶rsta svampen, men det kommer att krĂ¤va en hel del anstrĂ¤ngning. Den Ă¤r kopplad till en massa mycelknutor som Ă¤r gĂ¶mda i vĂ¤ggarna. Du mĂĄste fĂ¶rstĂ¶ra de flesta av dem innan du kan skada den ordentligt.
