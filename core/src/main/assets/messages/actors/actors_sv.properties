actors.hero.talent.satiated_spells.title=MĂ¤ttade trollformler
actors.hero.talent.satiated_spells.desc=_+1:_ Att Ă¤ta mat gĂ¶r att prĂ¤sten fĂĄr _3 skĂ¶ldskydd_ nĂ¤sta gĂĄng de kastar en besvĂ¤rjelse.\n\n_+2:_ Att Ă¤ta mat gĂ¶r att prĂ¤sten fĂĄr _5 skĂ¶ldskydd_ nĂ¤sta gĂĄng de kastar en besvĂ¤rjelse.
actors.hero.talent.satiated_spells.meta_desc=_Om denna talang erhĂĄlls av en annan hjĂ¤lte_ kommer den istĂ¤llet att ge skydd omedelbart, vilket bĂ¶rjar avta normalt efter 10 turer.
actors.hero.talent.holy_intuition.title=helig intuition
actors.hero.talent.holy_intuition.desc=_+1:_ PrĂ¤sten kan kasta _Holy Intuition,_ en besvĂ¤rjelse som avslĂ¶jar om ett fĂ¶remĂĄl Ă¤r fĂ¶rhĂ¤xat till en kostnad av _3 laddningar._\n\n_+2:_ PrĂ¤sten kan kasta _Holy Intuition,_ en besvĂ¤rjelse som avslĂ¶jar om ett fĂ¶remĂĄl Ă¤r fĂ¶rhĂ¤xat till en kostnad av _2 laddningar._
actors.hero.talent.holy_intuition.meta_desc=_Om denna talang erhĂĄlls av en annan hjĂ¤lte_ kommer den istĂ¤llet att lĂĄta hjĂ¤lten identifiera fĂ¶rbannelsen pĂĄ ett fĂ¶rbannat fĂ¶remĂĄl precis innan det utrustas, 15 % av gĂĄngerna vid +1 eller 25 % av gĂĄngerna vid +2.
actors.hero.talent.searing_light.title=brĂ¤nnande ljus
actors.hero.talent.searing_light.desc=_+1:_ PrĂ¤sten gĂ¶r _+3 skada med sina fysiska attacker mot fiender som Ă¤r upplysta av _Guiding Light_._\n\n_+2:_ PrĂ¤sten gĂ¶r _+5 skada med sina fysiska attacker mot fiender som Ă¤r upplysta av _Guiding Light_.
actors.hero.talent.searing_light.meta_desc=_Om denna talang erhĂĄlls av en annan hjĂ¤lte_ kommer den istĂ¤llet att ge sin bonusskada efter att en trollstav eller artefakt har anvĂ¤nts pĂĄ en fiende, med en nedkylningstid pĂĄ 20 turer.
actors.hero.talent.shield_of_light.title=skĂ¶ld av ljus
actors.hero.talent.shield_of_light.desc=_+1:_ PrĂ¤sten kan kasta _LjusskĂ¶ld,_ en besvĂ¤rjelse som kastas omedelbart och ger dem _2-4 rustning_ mot ett mĂĄl i 5 turer till en kostnad av 1 laddning.n\n_+2:_ PrĂ¤sten kan kasta _LjusskĂ¶ld_, en besvĂ¤rjelse som kastas omedelbart och ger dem _3-6 rustning_ mot ett mĂĄl i 5 turer till en kostnad av 1 laddning.
actors.hero.talent.shield_of_light.meta_desc=_Om denna talang erhĂĄlls av en annan hjĂ¤lte_ kommer den istĂ¤llet att minska den fysiska skadan som din mĂĄlfiende tar med 1, 33 % av tiden vid +1 eller 50% av tiden vid +2.

actors.hero.talent.enlightening_meal.title=Upplysande mĂĄltid
actors.hero.talent.enlightening_meal.desc=_+1:_ Att Ă¤ta mat tar 1 tur fĂ¶r prĂ¤sten och ger dem _0,67 laddningar_ pĂĄ deras heliga bok.\n\n_+2:_ Att Ă¤ta mat tar 1 tur fĂ¶r prĂ¤sten och ger dem _1 laddning_ pĂĄ deras heliga bok.
actors.hero.talent.enlightening_meal.meta_desc=_Om denna talang erhĂĄlls av en annan hjĂ¤lte_ ger den istĂ¤llet 2 turer med +1 i laddning av trollstav och artefakt, eller 3 turer med +2. Detta kan inte anvĂ¤ndas fĂ¶r att lĂĄta hornet av Ă¶verflĂ¶d ladda sig sjĂ¤lv.
actors.hero.talent.recall_inscription.title=Ă…terkalla inskription
actors.hero.talent.recall_inscription.refunded=Din artikel har ĂĄterbetalats!
actors.hero.talent.recall_inscription.desc=_+1:_ PrĂ¤sten kan kasta _Ă…terkalla inskription,_ en besvĂ¤rjelse som lĂĄter dem upprepa effekten av den senaste runstenen eller skriftrullen de anvĂ¤nde inom _10 turer._\n\n_+2:_ PrĂ¤sten kan kasta _Ă…terkalla inskription,_ en besvĂ¤rjelse som lĂĄter dem upprepa effekten av den senaste runstenen eller skriftrullen de anvĂ¤nde inom _300 turer.n\nĂ…terkalla inskription kan inte anvĂ¤ndas med uppgraderingsrullar. Denna besvĂ¤rjelses laddningskostnad varierar beroende pĂĄ vilken fĂ¶remĂĄl som nyligen anvĂ¤nts: 2 fĂ¶r en runsten, 3 fĂ¶r en rulle, 4 fĂ¶r en exotisk rulle. Laddningskostnaden fĂ¶rdubblas ocksĂĄ nĂ¤r den anvĂ¤nds med en transmutationsrulle eller alkemifĂ¶remĂĄl som mĂĄste tillverkas med transmutation eller uppgradering.
actors.hero.talent.recall_inscription.meta_desc=_Om denna talang erhĂĄlls av en annan hjĂ¤lte_ ĂĄterbetalas istĂ¤llet alla pergamentrullar eller runstenar 10% av tiden vid +1 eller 15% av tiden vid +2. Uppgraderingsskriftrullar Ă¤r undantagna frĂĄn denna effekt.
actors.hero.talent.sunray.title=SolstrĂĄle
actors.hero.talent.sunray.desc=_+1:_ PrĂ¤sten kan kasta _Sunray,_ en besvĂ¤rjelse som gĂ¶r _4-8 skada_ och fĂ¶rblindar mĂĄlet i _4 turer,_ till en kostnad av 1 laddning.\n\n_+2:_ PrĂ¤sten kan kasta _Sunray,_ en besvĂ¤rjelse som orsakar _6-12 skada_ och fĂ¶rblindar mĂĄlet i _6 turer_, till en kostnad av 1 laddning.\n\nSunray kan bara fĂ¶rblinda varje mĂĄl en gĂĄng, men om mĂĄlet redan Ă¤r fĂ¶rblindat av Sunray fĂ¶rlamas det istĂ¤llet. Sunray orsakar alltid maximal skada pĂĄ demoniska och odĂ¶da fiender.
actors.hero.talent.sunray.meta_desc=_Om denna talang erhĂĄlls av en annan hjĂ¤lte_ kommer den istĂ¤llet att gĂ¶ra att trollstavar och artefakter fĂ¶rblindar fiender i 4 turer, 15 % av tiden vid +1 eller 25 % av tiden vid +2.
actors.hero.talent.divine_sense.title=Gudomlig kĂ¤nsla
actors.hero.talent.divine_sense.desc=_+1:_ PrĂ¤sten kan kasta _Divine Sense_, en besvĂ¤rjelse som ger dem _8 rutor_ Mind Vision i 50 turer och som inte tar nĂĄgon tid att kasta, till en kostnad av 2 laddningar.\n\n_+2:_ PrĂ¤sten kan kasta _Divine Sense_, en besvĂ¤rjelse som ger dem _12 rutor_ Mind Vision i 50 turer och som inte tar nĂĄgon tid att kasta, till en kostnad av 2 laddningar.
actors.hero.talent.divine_sense.meta_desc=_Om denna talang erhĂĄlls av en annan hjĂ¤lte_ ger den istĂ¤llet mind vision under en kort stund efter att en trollstav eller artefakt med en rĂ¤ckvidd pĂĄ 3 rutor vid +1 eller 5 rutor vid +2 har anvĂ¤nts.
actors.hero.talent.bless.title=VĂ¤lsigna
actors.hero.talent.bless.desc=_+1:_ PrĂ¤sten kan kasta _VĂ¤lsigna,_ en besvĂ¤rjelse som ger _6 turer av vĂ¤lsignelse och 10 skĂ¶ldar_ nĂ¤r den kastas pĂĄ sig sjĂ¤lv eller _10 turer av vĂ¤lsignelse och 10 lĂ¤kning_ nĂ¤r den kastas pĂĄ en annan karaktĂ¤r, till en kostnad av 1 laddning.n\n_+2:_ PrĂ¤sten kan kasta _VĂ¤lsignelse_, en besvĂ¤rjelse som ger _10 turers vĂ¤lsignelse och 15 skĂ¶ldar_ nĂ¤r den kastas pĂĄ sig sjĂ¤lv eller _15 turers vĂ¤lsignelse och 15 lĂ¤kning_ nĂ¤r den kastas pĂĄ en annan karaktĂ¤r, till en kostnad av 1 laddning.\n\nĂ–verskott av lĂ¤kning frĂĄn denna besvĂ¤rjelse omvandlas till skĂ¶ldar.
actors.hero.talent.bless.meta_desc=_Om denna talang erhĂĄlls av en annan hjĂ¤lte_ kommer den istĂ¤llet att Ă¶ka trĂ¤ffsĂ¤kerheten och undvikandet fĂ¶r hjĂ¤lten och alla allierade med 3 % vid +1 eller 5 % vid +2.

actors.hero.talent.cleanse.title=Rensa
actors.hero.talent.cleanse.desc=_+1:_ PrĂ¤sten kan kasta _Rensa,_ en besvĂ¤rjelse som _tar bort negativa statuseffekter_ frĂĄn prĂ¤sten och alla allierade i nĂ¤rheten och ger dem _10 skĂ¶ld,_ till en kostnad av 2 laddningar.\n\n_+2:_ PrĂ¤sten kan kasta _Rensa_, en besvĂ¤rjelse som ger prĂ¤sten och alla allierade i nĂ¤rheten _3 turers immunitet mot negativa statuseffekter_ och ger dem _20 skĂ¶ld_, till en kostnad av 2 laddningar.n\n_+3:_ PrĂ¤sten kan kasta _Cleanse,_ en besvĂ¤rjelse som _ger 5 turer av immunitet mot negativa statuseffekter_ till prĂ¤sten och alla allierade i nĂ¤rheten, och ger dem _30 skĂ¶ld,_ till en kostnad av 2 laddningar.
actors.hero.talent.cleanse.meta_desc=_Om denna talang erhĂĄlls av en annan hjĂ¤lte_ kommer den istĂ¤llet att rensa negativa statuseffekter pĂĄ hjĂ¤lten efter anvĂ¤ndning av en trollstav eller artefakt, 10/20/30% av tiden vid +1/+2/+3.
actors.hero.talent.light_reading.title=LĂ¤tt lĂ¤sning
actors.hero.talent.light_reading.desc=_+1:_ PrĂ¤sten kan anvĂ¤nda sin heliga bok nĂ¤r den inte Ă¤r utrustad, men den laddas med _25% hastighet_ nĂ¤r den inte Ă¤r utrustad.\n\n_+2:_ PrĂ¤sten kan anvĂ¤nda sin heliga bok nĂ¤r den inte Ă¤r utrustad, men den laddas med _50% hastighet_ nĂ¤r den inte Ă¤r utrustad.\n\n_+3:_ PrĂ¤sten kan anvĂ¤nda sin heliga bok nĂ¤r den inte Ă¤r utrustad, men den laddas upp med _75% hastighet_ nĂ¤r den inte Ă¤r utrustad.
actors.hero.talent.light_reading.meta_desc=_Om denna talang erhĂĄlls av en annan hjĂ¤lte_ Ă¶kar istĂ¤llet laddningshastigheten fĂ¶r alla trollstavar med 7/13/20% vid +1/+2/+3.

actors.hero.talent.holy_lance.title=Heliga lans
actors.hero.talent.holy_lance.desc=_+1:_ PrĂ¤sten kan kasta _Helig lans,_ en fĂ¶rĂ¶dande besvĂ¤rjelse som gĂ¶r _30-55 skada_ till en kostnad av 4 laddningar.\n\n_+2:_ PrĂ¤sten kan kasta _Helig lans,_ en fĂ¶rĂ¶dande besvĂ¤rjelse som gĂ¶r _45-83 skada_ till en kostnad av 4 laddningar.\n\n_+3:_ PrĂ¤sten kan kasta _Helig lans,_ en fĂ¶rĂ¶dande besvĂ¤rjelse som orsakar _60-110 skada_ till en kostnad av 4 laddningar.\n\nHoly Lance orsakar alltid maximal skada pĂĄ demoniska och odĂ¶da fiender. Holy Lance har en nedkylningstid pĂĄ 30 turer innan den kan kastas igen.
actors.hero.talent.hallowed_ground.title=Hallowed Ground
actors.hero.talent.hallowed_ground.desc=_+1:_ PrĂ¤sten kan kasta _Hallowed Ground,_ en besvĂ¤rjelse som helgar terrĂ¤ngen i ett _3x3-omrĂĄde_ i 20 turer, till en kostnad av 2 laddningar.n\n\n_+2:_ PrĂ¤sten kan kasta _Hallowed Ground,_ en besvĂ¤rjelse som helgar marken i ett _5x5-omrĂĄde_ i 20 turer, till en kostnad av 2 laddningar.\n\n_+3:_ PrĂ¤sten kan kasta _Hallowed Ground,_ en besvĂ¤rjelse som helgar marken i ett _7x7-omrĂĄde_ i 20 turer, till en kostnad av 2 laddningar.\n\nNĂ¤r den kastas lĂ¤ker Hallowed Ground allierade fĂ¶r 15 HP, rotar fiender tillfĂ¤lligt och sprider kort grĂ¤s. DĂ¤refter lĂ¤ker den lĂĄngsamt allierade, fĂ¶rlamar fiender och fĂĄr hĂ¶gt grĂ¤s att vĂ¤xa slumpmĂ¤ssigt. Hallowed Ground ger prĂ¤sten skydd istĂ¤llet fĂ¶r lĂ¤kning och fĂ¶rstĂ¶rs av eld.
actors.hero.talent.mnemonic_prayer.title=Mnemonic Prayer
actors.hero.talent.mnemonic_prayer.desc=_+1:_ PrĂ¤sten kan kasta _Mnemonic Prayer_, en besvĂ¤rjelse som fĂ¶rlĂ¤nger buffs/debuffs pĂĄ en allierad/fiende i _3 turer_ till en kostnad av 1 laddning.\n\n_+2:_ PrĂ¤sten kan kasta _Mnemonic Prayer_, en besvĂ¤rjelse som fĂ¶rlĂ¤nger buffs/debuffs pĂĄ en allierad/fiende i _4 turer_ till en kostnad av 1 laddning.\n\n_+3:_ PrĂ¤sten kan kasta _Mnemonic Prayer_, en besvĂ¤rjelse som fĂ¶rlĂ¤nger buffs/debuffs pĂĄ en allierad/fiende i _5 turer_ till en kostnad av 1 laddning.\n\nMnemonic Prayer tar ingen tid att kasta. Mnemonic Prayer kan bara fĂ¶rlĂ¤nga en viss buff/debuff en gĂĄng och kan inte fĂ¶rlĂ¤nga buffs frĂĄn rustningsfĂ¶rmĂĄgor.

actors.hero.talent.lay_on_hands.title=lĂ¤gg hĂ¤nderna pĂĄ
actors.hero.talent.lay_on_hands.desc=_+1:_ Paladinen kan kasta _Lay on Hands,_ en besvĂ¤rjelse som omedelbart lĂ¤ker en nĂ¤rliggande karaktĂ¤r med _15 HP,_ eller ger paladinen _15 skĂ¶ld,_ till en kostnad av 1 laddning.n\n_+2:_ Paladinen kan anvĂ¤nda _Lay on Hands,_ en besvĂ¤rjelse som omedelbart lĂ¤ker en nĂ¤rliggande karaktĂ¤r med _20 HP_ eller ger paladinen _20 i skydd_ till priset av 1 laddning.n\n_+3:_ Paladinen kan kasta _Lay on Hands_, en besvĂ¤rjelse som omedelbart lĂ¤ker en nĂ¤rliggande karaktĂ¤r med _25 HP_ eller ger paladinen _25 skĂ¶ld_ till priset av 1 laddning.\n\nĂ–verskott av lĂ¤kning frĂĄn denna besvĂ¤rjelse omvandlas till skĂ¶ld. Lay on Hands kan kastas upprepade gĂĄnger, men kan inte applicera mer Ă¤n tre kast vĂ¤rda skĂ¶ld pĂĄ en gĂĄng.
actors.hero.talent.aura_of_protection.title=aura of protection
actors.hero.talent.aura_of_protection.desc=_+1:_ Paladinen kan kasta _Aura of Protection_, en besvĂ¤rjelse som ger paladinen och alla allierade inom 2 rutor _20% skaderesistens_ och effekten av paladinens rustningsglyf med _+50% kraft_ i 20 turer, till en kostnad av 2 laddningar.n\n_+2:_ Paladinen kan kasta _Skyddsaura_, en besvĂ¤rjelse som ger paladinen och alla allierade inom 2 rutor _30% skaderesistens_ och effekten av paladinens rustningsglyf med _+75% kraft_ i 20 turer, till en kostnad av 2 laddningar.\n\n_+3:_ Paladinen kan kasta _Skyddsaura_, en besvĂ¤rjelse som ger paladinen och alla allierade inom 2 rutor _40% skaderesistens_ och effekten av paladinens rustningsglyf med _+100% kraft_ i 20 turer, till en kostnad av 2 laddningar.
actors.hero.talent.wall_of_light.title=wall of light
actors.hero.talent.wall_of_light.desc=_+1:_ Paladinen kan kasta _Wall of Light,_ en besvĂ¤rjelse som skapar en _3 rutor bred_ solid vĂ¤gg framfĂ¶r Paladinen som stĂ¶ter bort fiender och varar i 20 turer, till en kostnad av 3 laddningar.\n\n_+2:_ Paladinen kan kasta _Wall of Light,_ en besvĂ¤rjelse som skapar en _5 rutor bred_ solid vĂ¤gg framfĂ¶r paladinen som stĂ¶ter bort fiender och varar i 20 turer, till en kostnad av 3 laddningar.\n\n_+3:_ Paladinen kan kasta _Wall of Light_, en besvĂ¤rjelse som skapar en _7 rutor bred_ solid vĂ¤gg framfĂ¶r paladinen som stĂ¶ter bort fiender och varar i 20 turer, till en kostnad av 3 laddningar.\n\nVĂ¤ggen kan placeras i kardinalriktningar eller diagonalt, och endast en vĂ¤gg kan existera ĂĄt gĂĄngen.

actors.hero.talent.divine_intervention.title=gudomlig ingripande
actors.hero.talent.divine_intervention.desc=_+1:_ Vid upphĂ¶jd form kan prĂ¤sten kasta _Gudomlig ingripande_, som ger prĂ¤sten och alla allierade upp till _150 skĂ¶ld_ och fĂ¶rlĂ¤nger upphĂ¶jd form med _3 turer._\n\n_+2:_ Vid upphĂ¶jd form kan prĂ¤sten kasta _Gudomlig ingripande_, som ger prĂ¤sten och alla allierade upp till _200 skĂ¶ld_ och fĂ¶rlĂ¤nger upphĂ¶jd form med _4 turer._\n\n_+3:_ I upphĂ¶jd form kan prĂ¤sten kasta _Gudomlig ingripande_, som ger prĂ¤sten och alla allierade upp till _250 skĂ¶ld_ och fĂ¶rlĂ¤nger upphĂ¶jd form med _5 turer._\n\n_+4:_ I upphĂ¶jd form kan prĂ¤sten kasta _Gudomligt ingripande_, som ger prĂ¤sten och alla allierade upp till _300 skĂ¶ld_ och fĂ¶rlĂ¤nger upphĂ¶jd form med _6 turer._\n\nGudomligt ingripande kostar hela 5 bokladdningar och kan bara kastas en gĂĄng i samma upphĂ¶jda form.
actors.hero.talent.judgement.title=judgement
actors.hero.talent.judgement.desc=_+1:_ I upphĂ¶jd form kan prĂ¤sten kasta _Domen,_ som gĂ¶r _10-20 skada_ pĂĄ alla synliga fiender.\n\n_+2:_ I upphĂ¶jd form kan prĂ¤sten kasta _Domen,_ som gĂ¶r _15-30 skada_ pĂĄ alla synliga fiender.\n\n_+3:_ I upphĂ¶jd form kan prĂ¤sten kasta _Domen,_ som gĂ¶r _20-40 skada_ pĂĄ alla synliga fiender.\n\n_+4:_ I upphĂ¶jd form kan prĂ¤sten kasta _Domen,_ som gĂ¶r _25-50 skada_ pĂĄ alla synliga fiender.\n\nDomen kostar 3 bokladdningar. Domen orsakar +33 % skada fĂ¶r varje besvĂ¤rjelse som prĂ¤sten har kastat sedan han gick in i upphĂ¶jd form eller sedan den senaste kastningen av Domen.
actors.hero.talent.flash.title=flash
actors.hero.talent.flash.desc=_+1:_ Vid upphĂ¶jd form kan prĂ¤sten kasta _Blixt_ fĂ¶r att teleportera sig upp till _3 rutor_ bort.\n\n_+2:_ Vid upphĂ¶jd form kan prĂ¤sten kasta _Blixt_ fĂ¶r att teleportera sig upp till _4 rutor_ bort.\n\n_+3:_ I upphĂ¶jd form kan prĂ¤sten kasta _Blixt_ fĂ¶r att teleportera sig upp till _5 rutor_ bort.\n\n_+4:_ I upphĂ¶jd form kan prĂ¤sten kasta _Blixt_ fĂ¶r att teleportera sig upp till _6 rutor_ bort.\n\nFlash kostar initialt 2 bokladdningar och 1 laddning fĂ¶r varje anvĂ¤ndning i samma upphĂ¶jda form.

actors.hero.talent.body_form.title=kroppsform
actors.hero.talent.body_form.desc=PrĂ¤sten kan kasta _Kroppsform_, som ger treenigheten kraften frĂĄn en fĂ¶rtrollning eller glyf som prĂ¤sten har identifierat under denna omgĂĄng, till en kostnad av 2 laddningar.\n\n_+1:_ NĂ¤r treenigheten anvĂ¤nds fĂĄr prĂ¤sten den valda effekten i _20 turer._\n\n_+2:_ NĂ¤r treenigheten anvĂ¤nds fĂĄr prĂ¤sten den valda effekten i _27 turer._\n\n_+3:_ NĂ¤r treenigheten anvĂ¤nds fĂĄr prĂ¤sten den valda effekten i _33 turer._\n\n_+4:_ NĂ¤r treenigheten anvĂ¤nds fĂĄr prĂ¤sten den valda effekten i _40 turer._\n\nTreenigheten kan bara fĂ¶rses med en kroppseffekt ĂĄt gĂĄngen. Treenighetens rustningskostnad Ă¤r hĂ¶gre om den valda glyfen Ă¤r sĂ¤llsynt och kraftfull.
actors.hero.talent.mind_form.title=sinnesform
actors.hero.talent.mind_form.desc=PrĂ¤sten kan kasta _Sinnesform_, som ger treenigheten kraften frĂĄn en trollstav eller ett kastvapen som prĂ¤sten har anvĂ¤nt under denna omgĂĄng, till en kostnad av 3 laddningar.\n\n_+1:_ NĂ¤r treenigheten anvĂ¤nds anvĂ¤nder prĂ¤sten den valda fĂ¶remĂĄlets zap- eller kasta-effekt, som om den vore _+3._\n\n_+2:_ NĂ¤r treenigheten anvĂ¤nds anvĂ¤nder prĂ¤sten den valda fĂ¶remĂĄlets zap- eller kasta-effekt, som om den vore _+4._\n\n_+3:_ NĂ¤r treenigheten anvĂ¤nds anvĂ¤nder prĂ¤sten den valda fĂ¶remĂĄlets zap- eller kasta-effekt som om den vore _+5._\n\n_+4:_ NĂ¤r treenigheten anvĂ¤nds anvĂ¤nder prĂ¤sten den valda fĂ¶remĂĄlets zap- eller kasta-effekt som om den vore _+6._\n\nTreenigheten kan endast fĂ¶rses med en sinneseffekt ĂĄt gĂĄngen.
actors.hero.talent.spirit_form.title=andeform
actors.hero.talent.spirit_form.desc=PrĂ¤sten kan kasta _Andeform_, som fĂ¶rser treenigheten med kraften frĂĄn en ring eller artefakt som prĂ¤sten har identifierat under denna omgĂĄng (fĂ¶rutom den heliga boken), till en kostnad av 4 laddningar.\n\n_+1:_ NĂ¤r treenigheten anvĂ¤nds fĂĄr prĂ¤sten en rings effekt pĂĄ _+1_ i 20 turer, eller utlĂ¶ser en artefakts effekt pĂĄ _+4._\n\n_+2:_ NĂ¤r treenigheten anvĂ¤nds fĂĄr prĂ¤sten en rings effekt pĂĄ _+2_ i 20 turer, eller utlĂ¶ser en artefakts effekt pĂĄ _+6._\n\n_+3:_ NĂ¤r treenigheten anvĂ¤nds fĂĄr prĂ¤sten en ringeffekt pĂĄ _+3_ i 20 turer, eller utlĂ¶ser en artefakts effekt vid _+8._\n\n_+4:_ NĂ¤r treenigheten anvĂ¤nds fĂĄr prĂ¤sten en ringeffekt pĂĄ _+4_ i 20 turer, eller utlĂ¶ser en artefakts effekt vid _+10.n\n\nTreenigheten kan endast fĂ¶rses med en andeeffekt ĂĄt gĂĄngen. Artefakter har olika effekter och rustningsladdningskostnader nĂ¤r de utlĂ¶ses av treenigheten.

actors.hero.talent.beaming_ray.title=strĂĄlande strĂĄle
actors.hero.talent.beaming_ray.desc=PrĂ¤sten kan kasta _StrĂĄlande strĂĄle_ frĂĄn en fĂ¶rstĂ¤rkt allierad till en kostnad av 1 laddning. Denna strĂĄle kan gĂĄ igenom vĂ¤ggar och teleporterar allierade till en vald plats. Om en fiende befinner sig pĂĄ den platsen, dyker allierade upp bredvid fienden och riktar in sig pĂĄ denne. StrĂĄlande strĂĄle kan Ă¤ven teleportera allierade som normalt Ă¤r orĂ¶rliga, men har dĂĄ halva rĂ¤ckvidden.n\n_+1:_ StrĂĄlande strĂĄle har en maximal rĂ¤ckvidd pĂĄ _4 rutor_ och Ă¶kar bonusen frĂĄn MĂĄnga makter till _+35% skada_ mot nĂ¤rmaste fiende i 10 turer.\n\n_+2:_ StrĂĄlande strĂĄle har en maximal rĂ¤ckvidd pĂĄ _8 rutor_ och Ă¶kar bonusen frĂĄn MĂĄngas kraft till _+40% skada_ mot nĂ¤rmaste fiende i 10 turer.\n\n_+3:_ StrĂĄlande strĂĄle har en maximal rĂ¤ckvidd pĂĄ _12 rutor_ och Ă¶kar MĂĄngas kraft-bonusen till _+45% skada_ mot nĂ¤rmaste fiende i 10 turer.\n\n_+4:_ StrĂĄlande strĂĄle har en maximal rĂ¤ckvidd pĂĄ _16 rutor_ och Ă¶kar MĂĄngas kraft-bonusen till _+50% skada_ mot nĂ¤rmaste fiende i 10 turer.
actors.hero.talent.life_link.title=livslĂ¤nk
actors.hero.talent.life_link.desc=PrĂ¤sten kan kasta LivslĂ¤nk mellan sig sjĂ¤lv och en fĂ¶rstĂ¤rkt allierad till en kostnad av 2 laddningar. Denna besvĂ¤rjelse gĂ¶r att skada delas mellan prĂ¤sten och deras allierade, och gĂ¶r att fĂ¶rdelaktiga prĂ¤stbesvĂ¤rjelser av nivĂĄ 3 eller lĂ¤gre gĂ¤ller fĂ¶r bĂĄda om nĂĄgon av dem pĂĄverkas.n\n_+1:_ LivslĂ¤nk varar i _10 turer_ och Ă¶kar bonusen frĂĄn MĂĄnga makt till _-35% skada som tas._\n\n_+2:_ LivslĂ¤nk varar i _13 turer_ och Ă¶kar bonusen frĂĄn MĂĄnga makt till _-40% skada som tas._\n\n_+3:_ LivslĂ¤nk varar i _17 turer_ och Ă¶kar bonusen frĂĄn MĂĄnga makter till _-45% skada som tas._\n\n_+4:_ LivslĂ¤nk varar i _20 turer_ och Ă¶kar bonusen frĂĄn MĂĄnga makter till _-50% skada som tas._
actors.hero.talent.stasis.title=Stasis
actors.hero.talent.stasis.desc=PrĂ¤sten kan kasta _Stasis_ pĂĄ en fĂ¶rstĂ¤rkt allierad till en kostnad av 2 laddningar. Stasis tar tillfĂ¤lligt bort allierade frĂĄn fĂ¤ngelsehĂĄlan och bevarar den ĂĄterstĂĄende tiden pĂĄ alla buffar, inklusive Power of Many. Allierade ĂĄterkommer bredvid dig nĂ¤r effekten upphĂ¶r. Stasis kan kastas omedelbart och utan kostnad fĂ¶r att avsluta effekten i fĂ¶rtid. Stasis fungerar pĂĄ orĂ¶rliga allierade, men kan inte flytta dem mellan fĂ¤ngelsehĂĄlor. \n\n_+1:_ Stasis varar i max _60 turer. \n\n_+2:_ Stasis varar i max _90 turer. \n\n_+3:_ Stasis varar i max _120 turer. \n\n_+4:_ Stasis varar i max _150 turer. \n\nn\nPrĂ¤sten kan ocksĂĄ kasta Beaming Ray nĂ¤r en allierad Ă¤r i stasis fĂ¶r att ĂĄterkalla dem, eller kasta Life Link fĂ¶r att fĂ¶rebyggande tillĂ¤mpa dess effekt. Allierade drar dock inte nytta av Life Link vid stasis.


