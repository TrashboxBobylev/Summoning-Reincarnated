actors.hero.talent.ratlomacy.desc=_+1:_ AnvĂ¤nd ratmogrify pĂĄ en ratmogrifierad fiende fĂ¶r att gĂ¶ra dem vĂ¤nliga och gĂ¶ra fĂ¶rvandlingen permanent.\n\n_+2:_ AnvĂ¤nd ratmogrify pĂĄ en ratmogrifierad fiende fĂ¶r att gĂ¶ra dem vĂ¤nliga, gĂ¶ra fĂ¶rvandlingen permanent och ge dem _2 turer_ med adrenalin.\n\n_+3:_ AnvĂ¤nda ratmogrify pĂĄ en ratmogrifierad fiende gĂ¶r dem vĂ¤nliga, gĂ¶r fĂ¶rvandlingen permanent och ger dem _4 turer_ med adrenalin.\n\n_+4:_ AnvĂ¤nda ratmogrify pĂĄ en ratmogrifierad fiende gĂ¶r dem vĂ¤nliga, gĂ¶r fĂ¶rvandlingen permanent och ger dem _6 turer_ med adrenalin.
