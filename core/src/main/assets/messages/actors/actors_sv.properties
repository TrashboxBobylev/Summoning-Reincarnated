actors.hero.talent.cached_rations.title=undangĂ¶mda ransoner
actors.hero.talent.cached_rations.desc=_+1:_ Skurken kan hitta _2 proviantransoner_ placerade i kistor vid utforskning av de nĂ¤rmaste vĂĄningarna i fĂ¤ngelsehĂĄlan.\n\n_+2:_ Skurken kan hitta _3 proviantransoner_ placerade i kistor vid utforskning av de nĂ¤rmaste vĂĄningarna i fĂ¤ngelsehĂĄlan.\n\nFĂ¶rrĂĄdsransoner Ă¤ts snabbt, ĂĄterstĂ¤ller en mĂĄttlig mĂ¤ttnadskĂ¤nsla, lĂ¤ker 5 hp och ĂĄterstĂ¤ller 1 laddning till skuggmanteln.
