actors.hero.talent.liquid_willpower.title=flytande viljestyrka
actors.hero.talent.liquid_willpower.desc=_+1:_ Krigaren fĂĄr _6,5% av sin maximala HP i skĂ¶ld_ nĂ¤r han dricker eller kastar en dryck, brygd eller elixir.\n\n_+2:_ Krigaren fĂĄr _10% av sin maximala HP i skĂ¶ld_ nĂ¤r han dricker eller kastar en dryck, brygd eller elixir.\n\nSkĂ¶ldens vĂ¤rde fĂ¶rdubblas nĂ¤r du anvĂ¤nder styrkedrycker, erfarenhetsdrycker eller alkemiprodukter som mĂĄste tillverkas med hjĂ¤lp av dessa drycker.\n\nFĂ¶r alkemiprodukter med hĂ¶gre utgĂĄngsmĂ¤ngd (t.ex. vattenbrygd) har denna talang en chans att aktiveras beroende pĂĄ hur mĂĄnga av den produkten som tillverkas.
actors.hero.talent.runic_transference.title=runĂ¶verfĂ¶ring
