actors.mobs.npcs.ghost.name=sorgset spĂ¶ke
actors.mobs.npcs.ghost.rat_1=Hej %s... En gĂĄng var jag som du â€“ stark och sjĂ¤lvsĂ¤ker... Men jag blev dĂ¶dad av ett vidrigt odjur... Jag kan inte lĂ¤mna denna plats... Inte fĂ¶rrĂ¤n jag har hĂ¤mnats... DĂ¶da den _stinkande rĂĄttan_ som tog mitt liv...\n\nDen smyger omkring pĂĄ golvet... Sprider smuts Ă¶verallt... _Akta dig fĂ¶r dess stinkande moln och frĂ¤tande bett, syran lĂ¶ses upp i vatten..._
