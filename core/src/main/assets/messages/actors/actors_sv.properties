actors.mobs.npcs.blacksmith.exit_warn_low=Ă„r du redan klar? Det ser inte ut som om du har mycket guld. Du borde kunna fĂĄ _40 stycken._\n\n_Kom ihĂĄg att jag inte slĂ¤pper in dig igen nĂ¤r du kommer upp._
