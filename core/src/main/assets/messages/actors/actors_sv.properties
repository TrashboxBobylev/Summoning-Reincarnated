actors.hero.talent.expose_weakness.desc=_+1:_ Fiender som attackerar Duellantens efterbild blir svaga och sĂĄrbara i _2 turer_.\n\n_+2:_ Fiender som attackerar Duellantens efterbild blir svaga och sĂĄrbara i _4 turer_.\n\n_+3:_ Fiender som attackerar Duellantens efterbild blir svaga och sĂĄrbara i _6 turer_.\n\n_+4:_ Fiender som attackerar Duellantens efterbild blir svaga och sĂĄrbara i _8 turer_.
actors.hero.talent.counter_ability.title=motfĂ¶rmĂĄga
actors.hero.talent.counter_ability.desc=_+1:_ Om Duellanten anvĂ¤nder en vapenfĂ¶rmĂĄga inom 3 turer efter att hennes efterbild har attackerats ĂĄterfĂĄr hon omedelbart _0,38 laddningar_.\n\n_+2:_ Om Duellanten anvĂ¤nder en vapenfĂ¶rmĂĄga inom 3 turer efter att hennes efterbild har attackerats ĂĄterfĂĄr hon omedelbart _0,77 laddningar_.\n\n_+3:_ Om Duellanten anvĂ¤nder en vapenfĂ¶rmĂĄga inom 3 turer efter att hennes efterbild har attackerats, ĂĄterfĂĄr hon omedelbart _1,13 laddningar_.\n\n_+4:_ Om Duellanten anvĂ¤nder en vapenfĂ¶rmĂĄga inom 3 turer efter att hennes efterbild har attackerats, ĂĄterfĂĄr hon omedelbart _1,5 laddningar_.

