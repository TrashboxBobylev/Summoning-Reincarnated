actors.mobs.npcs.prismaticimage.desc=Denna skimrande illusion liknar dig mycket och verkar till och med anvĂ¤nda ditt nuvarande vapen och din rustning.\n\nPrismatiska bilder fĂ¶rsĂ¶ker sĂ¶ka upp och dra till sig fiendernas uppmĂ¤rksamhet och anvĂ¤nder sin fĂ¶rbĂ¤ttrade fĂ¶rsvar och HP fĂ¶r att skydda dig. Vid de inte har samma offensiva kraft som spegelbilder har de fĂ¶rbĂ¤ttrad hĂĄllbarhet, inklusive fĂ¶rdelar frĂĄn din rustning.\n\nNĂ¤r de reduceras till 0 hp kommer prismatiska bilder att blekna under flera turer och kan fortfarande lĂ¤kas under denna tid. NĂ¤r inga fiender Ă¤r nĂ¤rvarande kommer prismatiska bilder att blekna och ĂĄterfĂ¶renas med sin mĂ¤stare.
