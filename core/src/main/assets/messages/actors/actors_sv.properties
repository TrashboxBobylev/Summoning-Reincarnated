actors.mobs.npcs.shopkeeper.talk_prison_warrior=Det Ă¤r en intressant sigill du har dĂ¤r, de brukar vara hela. Ă„r du en vanĂ¤rad hjĂ¤lte eller nĂĄgot? Tja, vad du Ă¤n har gjort Ă¤r det inte min sak, dina mynt Ă¤r fortfarande giltiga.
actors.mobs.npcs.shopkeeper.talk_prison_mage=Hehe, jag tror jag har sett en efterlysningsaffisch med ditt namn pĂĄ nĂĄgonstans i staden. Ă„r du pĂĄ flykt? Ă…h, du Ă¤r oskyldig, eller hur? SjĂ¤lvklart, sjĂ¤lvklart... Oroa dig inte, jag har bĂ¤ttre saker att gĂ¶ra Ă¤n att ange dig, men du kanske borde kĂ¶pa nĂĄgot fĂ¶r att vara pĂĄ den sĂ¤kra sidan?
actors.mobs.npcs.shopkeeper.talk_prison_rogue=Kommer du frĂĄn tjuvgillet fĂ¶r att rensa omrĂĄdet? Nej, bara shopping? DĂ¶da nĂĄgra monster vid det hĂ¤r laget. FĂ¶rvĂ¤nta dig ingen rabatt, jag betalar bra skyddspengar till er och ni skyddar mig knappt hĂ¤r nere.
actors.mobs.npcs.shopkeeper.talk_prison_huntress=Du verkar vara pĂĄ fel plats, frĂ¶ken. TrĂĄnga fĂ¤ngelsekorridorer Ă¤r inte lika rymliga som stora salar eller skogarna som omger staden, eller hur? Hehe, bry dig inte om mitt babbel, varfĂ¶r kĂ¶per du inte nĂĄgot?
actors.mobs.npcs.shopkeeper.talk_prison_duelist=Jaha, Ă¤r det inte den resande hjĂ¤lten! Om du fĂ¶rsĂ¶ker rĂ¤dda en annan stad sĂĄ lycka till, farorna hĂ¤r Ă¤r mycket vĂ¤rre Ă¤n smĂĄ banditgĂ¤ng. Jag Ă¤r sĂ¤ker pĂĄ att du klarar det bĂ¤ttre Ă¤n nĂĄgon annan, fĂ¶rsĂ¶k bara att inte dĂ¶ precis utanfĂ¶r min butik.
actors.mobs.npcs.shopkeeper.talk_prison_cleric=Hej dĂ¤r, Ers HĂ¶ghet, eller Ă¤r det Ers Helighet nu? Hehe, hur som helst Ă¤r det hĂ¤r ingen plats fĂ¶r dig, mĂĄnga skulle bli ganska upprĂ¶rda om du dog. Du har vĂ¤l nĂĄgra mynt, varfĂ¶r inte kĂ¶pa nĂĄgot fĂ¶r att fĂ¶rhindra det?
actors.mobs.npcs.shopkeeper.talk_caves=Spendera pengar, lev lĂ¤ngre.\n\nĂ…h, och hĂ¤lsa den dĂ¤r trollesmeden frĂĄn mig om du ser honom. PĂĄminn den dĂ¤r klumpiga typen att han fortfarande Ă¤r skyldig mig pengar fĂ¶r hammaren jag sĂĄlde till honom fĂ¶rra veckan!
actors.mobs.npcs.shopkeeper.talk_city=Mina varor kan hĂĄlla dig sĂ¤ker hĂ¤r nere. \n\n...Och snĂ¤lla, hĂ¤ng inte hĂ¤r. Det tog evigheter att fĂĄ lokalbefolkningen att lĂ¤mna mig ifred, jag vill inte att du drar till dig problem!
actors.mobs.npcs.shopkeeper.talk_halls=Hej dĂ¤r, jag har specialpriser fĂ¶r demonjĂ¤gare! \n\nOch var fĂ¶rsiktig dĂ¤r nere! Demoner dĂ¤r nere bryr sig inte om hur modig du Ă¤r. Du kan inte komma tillbaka och spendera mer pengar om du Ă¤r dĂ¶d! ;)\n\nĂ„r demonerna som jag? Hehe, inte alls. Jag Ă¤r bara en liten kille, inte mycket till kĂ¤mpe, och jag har lyckats behĂĄlla mitt fĂ¶rstĂĄnd. Demoner dĂ¤r nere Ă¤r mycket starkare varelser, och de har alla fĂ¶rslavats av... ja... var bara fĂ¶rsiktig dĂ¤r nere.
actors.mobs.npcs.shopkeeper.talk_ascent=Jag vet inte vad du tĂ¤nker gĂ¶ra med den amuletten, men jag vill inte ha nĂĄgot med det att gĂ¶ra. KĂ¶p nĂĄgot och gĂĄ vidare, vi mĂĄste bĂĄda lĂ¤mna det hĂ¤r stĂ¤llet!
actors.mobs.npcs.shopkeeper.desc=Denna kraftiga man passar bĂ¤ttre i ett handelsdistrikt i en storstad Ă¤n i en fĂ¤ngelsehĂĄla. Hans priser fĂ¶rklarar varfĂ¶r han fĂ¶redrar att gĂ¶ra affĂ¤rer hĂ¤r.

actors.mobs.npcs.wandmaker.name=gammal trollstavsmakare
actors.mobs.npcs.wandmaker.intro_warrior=Ă…h, hej dĂ¤r! Vilken trevlig Ă¶verraskning att trĂ¤ffa en krigare frĂĄn norr pĂĄ en sĂĄ deprimerande plats! Du mĂĄste ha rest lĂĄngt fĂ¶r att komma hit. Om du Ă¤r ute efter Ă¤ventyr kanske jag har ett uppdrag ĂĄt dig.
actors.mobs.npcs.wandmaker.intro_rogue=Ă…h, du skrĂ¤mde mig! Jag har inte trĂ¤ffat nĂĄgon bandit frĂĄn denna plats som fortfarande Ă¤r vid sina sinnens fulla bruk, sĂĄ du mĂĄste vara frĂĄn ytan! Om du Ă¤r villig att hjĂ¤lpa en frĂ¤mling, kanske jag har ett uppdrag ĂĄt dig.
actors.mobs.npcs.wandmaker.intro_mage=Ă…h, hej %s! Jag hĂ¶rde att det var brĂĄk mellan dig och trollkarlarnas institut? Ă…h, strunt samma, jag har aldrig gillat de dĂ¤r trĂĄngsynta typerna Ă¤ndĂĄ. Om du vill, kanske jag har ett uppdrag ĂĄt dig.
actors.mobs.npcs.wandmaker.intro_huntress=Ă…h, hej frĂ¶ken! Ett vĂ¤nligt ansikte Ă¤r en trevlig Ă¶verraskning hĂ¤r nere, eller hur? Jag Ă¤r faktiskt sĂ¤ker pĂĄ att jag har sett dig fĂ¶rut, men jag kommer inte pĂĄ var... Ă…h, strunt samma, om du Ă¤r hĂ¤r fĂ¶r Ă¤ventyr har jag kanske en uppgift ĂĄt dig.
actors.mobs.npcs.wandmaker.intro_duelist=Ă…h, hej frĂ¶ken! Vilken trevlig Ă¶verraskning att trĂ¤ffa en hjĂ¤lte pĂĄ en sĂĄ deprimerande plats! Om du vill hjĂ¤lpa en gammal man har jag kanske en uppgift ĂĄt dig.
actors.mobs.npcs.wandmaker.intro_cleric=Ă…h, hej Ers HĂ¶ghet! Vilken trevlig Ă¶verraskning att trĂ¤ffa er pĂĄ en sĂĄ deprimerande plats! Jag vill inte besvĂ¤ra er, men jag har kanske en uppgift ĂĄt er.
actors.mobs.npcs.wandmaker.intro_1=\n\nJag kom hit fĂ¶r att hitta en sĂ¤llsynt ingrediens till en trollstav, men jag har gĂĄtt vilse och min magiska skĂ¶ld fĂ¶rsvagas. Jag mĂĄste snart ge mig av, men jag kan inte ĂĄka utan att fĂĄ det jag kom fĂ¶r.
actors.mobs.npcs.wandmaker.intro_dust=Jag letar efter lite _likstoft._ Det Ă¤r en speciell sorts fĂ¶rbannad benmjĂ¶l som brukar finnas pĂĄ platser som denna. Det borde finnas ett barrikaderat rum nĂĄgonstans hĂ¤r i nĂ¤rheten, jag Ă¤r sĂ¤ker pĂĄ att jag kan hitta lite stoft dĂ¤r. Var dock fĂ¶rsiktig, dammet Ă¤r mycket kraftigt fĂ¶rbannat. Kom tillbaka till mig sĂĄ fort du kan sĂĄ ska jag rena det ĂĄt dig.
actors.mobs.npcs.wandmaker.intro_ember=Jag letar efter lite _fĂ¤rsk glĂ¶d_ frĂĄn en nyfĂ¶dd eldvarelse. Varelser dyker oftast upp nĂ¤r en besvĂ¤rjelse inte kontrolleras, sĂĄ leta bara efter nĂĄgra ljus och en ritualplats sĂĄ Ă¤r jag sĂ¤ker pĂĄ att du kan fĂĄ en att dyka upp. Du bĂ¶r dock _undvika att stĂ¤nga in dig sjĂ¤lv_ vid striden, eller ha _nĂĄgon sorts frysande fĂ¶remĂĄl till hands._ NyfĂ¶dda elementĂ¤rer Ă¤r ganska kraftfulla och kaotiska, men de tĂĄl inte kyla.
actors.mobs.npcs.wandmaker.intro_berry=Den gamla fĂ¤ngelsevakten hade en _rotbĂ¤rsplanta_ och jag Ă¤r ute efter ett av dess frĂ¶n. VĂ¤xten har nog vildvuxit vid det hĂ¤r laget, sĂĄ det kan bli svĂĄrt att fĂĄ tag pĂĄ ett frĂ¶. TrĂ¤dgĂĄrden borde ligga nĂĄgonstans hĂ¤r i nĂ¤rheten. FĂ¶rsĂ¶k att hĂĄlla dig borta frĂĄn dess slingrande rankor om du vill hĂĄlla dig hel. Det kan vara frestande att anvĂ¤nda eld, men gĂ¶r det inte, fĂ¶r dĂĄ dĂ¶dar du vĂ¤xten och fĂ¶rstĂ¶r frĂ¶na.
actors.mobs.npcs.wandmaker.intro_2=\n\nOm du kan skaffa det ĂĄt mig betalar jag gĂ¤rna med en av mina fint tillverkade trollstavar! Jag har tvĂĄ med mig, sĂĄ du kan vĂ¤lja vilken du vill ha.
