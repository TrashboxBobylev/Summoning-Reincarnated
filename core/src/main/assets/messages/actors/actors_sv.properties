##classes
actors.hero.heroclass.warrior=krigare
actors.hero.heroclass.warrior_desc_short=Krigaren tĂĄl extra skada tack vare skĂ¶lden som han fĂĄr genom sin _brutna sigill._ Sigillet kan flyttas mellan rustningar och _Ă¶verfĂ¶r en enda uppgradering._
actors.hero.heroclass.warrior_desc=Krigaren bĂ¶rjar med en unik trasig sigill som ger honom en skĂ¶ld nĂ¤r han har mindre Ă¤n hĂ¤lften av sin hĂ¤lsa kvar. Sigillet kan flyttas mellan rustningar och kan _Ă¶verfĂ¶ra en enda uppgradering_ med sig.\n\nKrigaren bĂ¶rjar ocksĂĄ med ett _slitet kort svĂ¤rd_, _tre kaststenar_, tygrustning, en vattenflaska och en sammetspĂĄse.\n\nKrigaren identifierar automatiskt:\n_-_ Identifieringsrullar\n_-_ Helande drycker\n_-_ Raserirullar
actors.hero.heroclass.warrior_unlock=Krigaren Ă¤r automatiskt upplĂĄst.

actors.hero.heroclass.mage=magiker
actors.hero.heroclass.mage_desc_short=Magikern Ă¤r en expert pĂĄ det Ă¶vernaturliga och bĂ¤r pĂĄ en _magisk stav_ som Ă¤r starkare Ă¤n en trollstav. Staven kan _laddas med vilken trollstav_ som helst som Magikern hittar.
actors.hero.heroclass.mage_desc=Magikern bĂ¶rjar med en unik stav som laddas betydligt snabbare Ă¤n en trollstav och har 1 laddning mer. Staven kan laddas med vilken trollstav som helst som magikern hittar i fĂ¤ngelsehĂĄlan. \n\nMagikern bĂ¶rjar ocksĂĄ med en _trollstav med magiska projektiler_ laddad i sin stav, tygrustning, en vattenflaska och en sammetspĂĄse. \n\nMagikern identifierar automatiskt:\n_-_ Identifieringsrullar\n_-_ Flytande eldpotioner\n_-_ Uppgraderingsrullar
actors.hero.heroclass.mage_unlock=_AnvĂ¤nd en upgraderingsrulle fĂ¶r att gĂ¶ra nĂĄgot starkare_ sĂĄ lĂĄser du upp Magikern.

actors.hero.heroclass.rogue=skurk
actors.hero.heroclass.rogue_desc_short=Skurken kan undvika fiender och slĂĄ till frĂĄn osynlighet med hjĂ¤lp av sin _skuggmantel._ Han kan ocksĂĄ _upptĂ¤cka hemligheter och fĂ¤llor_ pĂĄ lĂ¤ngre avstĂĄnd.
actors.hero.heroclass.rogue_desc=Skurken bĂ¶rjar med en _unik skuggmantel_, som han kan anvĂ¤nda fĂ¶r att bli osynlig nĂ¤r han vill.n\nSkurken kan _upptĂ¤cka hemligheter och fĂ¤llor_ pĂĄ lĂ¤ngre avstĂĄnd.\n\nSkurken bĂ¶rjar ocksĂĄ med _en dolk_, _tre kastknivar_, tygskydd, en vattenflaska och en sammetspĂĄse.\n\nSkurken identifierar automatiskt:\n_-_ Identifieringsrullar\n_-_ Osynlighetsdrycker\n_-_ Magiska kartrullar
actors.hero.heroclass.rogue_unlock=_GenomfĂ¶r 10 Ă¶verraskningsattacker under ett spel_ fĂ¶r att lĂĄsa upp Skurken.

actors.hero.heroclass.huntress=jĂ¤gare
actors.hero.heroclass.huntress_desc_short=JĂ¤garen Ă¤r en mĂ¤stare pĂĄ kastvapen och har en _magisk bĂĄge_ med oĂ¤ndligt mĂĄnga pilar. Hon kan ocksĂĄ springa genom hĂ¶gt grĂ¤s _utan att trampa ner det._
actors.hero.heroclass.huntress_desc=JĂ¤garen bĂ¶rjar med en unik andebĂĄge som kan avfyra ett oĂ¤ndligt antal trollade pilar.n\nJĂ¤garen kan ta sig fram genom hĂ¶gt grĂ¤s _utan att trampa ner det_.\n\nJĂ¤garen bĂ¶rjar ocksĂĄ med _spikhandskar_, tygrustning, en vattenflaska och en sammetspĂĄse.\n\nJĂ¤garen identifierar automatiskt:\n_-_ Identifieringsrullar\n_-_ Drycker fĂ¶r klarsyn\n_-_ Vaggvisrullar
actors.hero.heroclass.huntress_unlock=FĂ¶r att lĂĄsa upp JĂ¤garen _trĂ¤ffa fiender med kastvapen 10 gĂĄnger i ett spel._

actors.hero.heroclass.duelist=duellanten
actors.hero.heroclass.duelist_desc_short=Duellanten Ă¤r en vapenmĂ¤stare som kan anvĂ¤nda sitt vapen fĂ¶r att utlĂ¶sa en _speciell vapenfĂ¤rdighet._ Denna speciella fĂ¤rdighet Ă¤r _olika fĂ¶r varje vapen._
actors.hero.heroclass.duelist_desc=Duellanten bĂ¶rjar med en unik rapir med en specialfĂ¶rmĂĄga som laddas upp Ă¶ver tid.n\nVarje vapen i spelet har en _olika specialfĂ¶rmĂĄga_ som duellisten kan anvĂ¤nda.\n\nDuellanten bĂ¶rjar ocksĂĄ med _tvĂĄ kastspikar_, tygrustning, en vattenflaska och en sammetspĂĄse.\n\nDuellanten identifierar automatiskt:\n_-_ Identifieringsrullar\n_-_ Styrkedrycker\n_-_ Spegelbildsrullar
actors.hero.heroclass.duelist_unlock=_Utrusta dig med ett vapen av rank 2 eller hĂ¶gre utan nĂĄgot styrkestraff_ fĂ¶r att lĂĄsa upp Duellanten.

actors.hero.heroclass.cleric=cleric
actors.hero.heroclass.cleric_desc_short=PrĂ¤sten Ă¤r en gudomlig trollkarl som anvĂ¤nder sin unika _heliga bok_ fĂ¶r att kanalisera gudomlig magi. De kan _lĂ¤ra sig och uppgradera trollformler_ via talanger.
actors.hero.heroclass.cleric_desc=PrĂ¤sten bĂ¶rjar med en _unik helig bok_ som de kan anvĂ¤nda fĂ¶r att kasta olika trollformler.\n\nDe flesta av prĂ¤stens talanger Ă¤r inriktade pĂĄ att lĂ¤ra sig eller uppgradera trollformler.\n\nPrĂ¤sten bĂ¶rjar ocksĂĄ med _en klubba_, tygrustning, en vattenflaska och en sammetspĂĄse.\n\nPrĂ¤sten identifierar automatiskt:\n_-_ Identifieringsrullar\n_-_ Renhetsdrycker\n_-_ Skriftrullar fĂ¶r att ta bort fĂ¶rbannelser
actors.hero.heroclass.cleric_unlock=FĂ¶r att lĂĄsa upp prĂ¤sten mĂĄste du helt rena alla fĂ¶rbannade utrustningsdelar frĂĄn fĂ¶rbannelsen.

actors.hero.herosubclass.berserker=bĂ¤rsĂ¤rk
actors.hero.herosubclass.berserker_short_desc=_BĂ¤rsĂ¤rkaren_ bygger ilska allteftersom han tar skada. Ilska Ă¶kar hans skada och kan aktiveras vid 100% fĂ¶r extra avskĂ¤rmning.
actors.hero.herosubclass.berserker_desc=Berserkern fĂĄr raseri nĂ¤r han tar fysisk skada, inklusive skada som blockeras av hans rustning! Raseriet avtar gradvis med tiden, men avtar lĂĄngsammare om han har lĂĄg HP. Vid maximal raseri kan han bli berserk, fĂĄ en skĂ¶ld och behĂĄlla sitt raseri sĂĄ lĂ¤nge han har skĂ¶ld kvar. SkĂ¶lden skalar med berserkerns rustningsnivĂĄ och kan fĂ¶rstĂ¤rkas kraftigt om han har lĂĄg HP. Berserkern behĂ¶ver tid fĂ¶r att ĂĄterhĂ¤mta sig efter att han blivit berserk.
actors.hero.herosubclass.gladiator=gladiator
actors.hero.herosubclass.gladiator_short_desc=Gladiatorn bygger kombination nĂ¤r han utfĂ¶r lyckade attacker. Han kan spendera kombination fĂ¶r att anvĂ¤nda unika fĂ¶rmĂĄgor.
actors.hero.herosubclass.gladiator_desc=Gladiatorn bygger upp en kombo-poĂ¤ng varje gĂĄng han lyckas med en attack med ett nĂ¤rstridsvapen eller ett kastvapen. Om gladiatorn inte lyckas med en attack inom 5 turer (15 turer efter en dĂ¶dande attack) ĂĄterstĂ¤lls hans kombo.\n\nNĂ¤r han bygger upp kombinationer kan gladiatorn anvĂ¤nda en rad olika fĂ¶rmĂĄgor som garanterat trĂ¤ffar:\n2 kombinationer: slĂĄ tillbaka fienden, behĂĄller kombinationen\n4 kombinationer: orsaka skada baserat pĂĄ rustning\n6 kombinationer: parera, behĂĄller kombinationen\n8 kombinationer: skada mĂĄlet och fiender i nĂ¤rheten\n10 kombinationer: attackera en gĂĄng fĂ¶r varje kombination
actors.hero.herosubclass.battlemage=stridsmagiker
actors.hero.herosubclass.battlemage_short_desc=_Stridsmagikern_ frammanar bonuseffekter nĂ¤r han slĂĄss i nĂ¤rstrid med sin stav. Dessa effekter beror pĂĄ vilken trollstav hans stav Ă¤r fĂ¶rtrollad med.
actors.hero.herosubclass.battlemage_desc=Stridsmagikern fĂĄr en bonuseffekt varje gĂĄng han slĂĄr i nĂ¤rstrid med sin stav, som om hans stav hade en extra fĂ¶rtrollning. Dessa effekter beror pĂĄ den trollstav som hans stav Ă¤r fĂ¶rtrollad med, varje trollstav har sin egen effekt. UtĂ¶ver trollstavseffekterna fĂĄr Stridsmagikerns stav ocksĂĄ 0,5 laddningar nĂ¤r han slĂĄr med den.
actors.hero.herosubclass.warlock=hĂ¤xmĂ¤stare
actors.hero.herosubclass.warlock_short_desc=_HĂ¤xmĂ¤staren_ har en chans att sjĂ¤lmĂ¤rka fiender med sina trollstavar. Han helas nĂ¤rhelst han gĂ¶r fysisk skada till mĂ¤rkta fiender.
actors.hero.herosubclass.warlock_desc=HĂ¤xmĂ¤staren har en chans att sĂ¤tta ett sjĂ¤lsmĂ¤rke pĂĄ karaktĂ¤rer nĂ¤r han anvĂ¤nder trollstavar pĂĄ dem. Chansen att sĂ¤tta ett sjĂ¤lsmĂ¤rke och dess varaktighet Ă¶kar med trollstavens nivĂĄ. \n\nNĂ¤r en fiende Ă¤r sjĂ¤lsmĂ¤rkt lĂ¤ker HĂ¤xmĂ¤staren 2 hp fĂ¶r varje 5 skada han gĂ¶r pĂĄ dem, men endast med attacker frĂĄn nĂ¤rstridsvapen eller kastvapen, inte frĂĄn trollstavar!
actors.hero.herosubclass.assassin=lĂ¶nnmĂ¶rdare
actors.hero.herosubclass.assassin_short_desc=_LĂ¶nnmĂ¶rdaren_ kan fĂ¶rbereda ett dĂ¶dligt slag medan han Ă¤r osynlig. Ju lĂ¤ngre han vĂ¤ntar, ju starkare Ă¤r attacken.
actors.hero.herosubclass.assassin_desc=LĂ¶nnmĂ¶rdaren fĂ¶rbereder sitt nĂ¤sta slag nĂ¤r han blir osynlig. Ju lĂ¤ngre han fĂ¶rbereder sig, desto kraftfullare blir hans nĂ¤sta attack. FĂ¶rberedelsen pĂĄgĂĄr i upp till 9 turer.\n\nEfter fĂ¶rberedelsen gĂ¶r LĂ¶nnmĂ¶rdaren bonusskada vid sin nĂ¤sta attack, kan blinka till sitt mĂĄl och kan till och med omedelbart dĂ¶da fiender som Ă¤r tillrĂ¤ckligt svaga.
actors.hero.herosubclass.freerunner=frilĂ¶pare
actors.hero.herosubclass.freerunner_short_desc=FrilĂ¶paren bygger upp momentum nĂ¤r han springer, vilket kan anvĂ¤ndas fĂ¶r att starta frilĂ¶pning. Detta ger honom bonus i hastighet och undvikande under en kort stund.
actors.hero.herosubclass.freerunner_desc=NĂ¤r FrilĂ¶paren rĂ¶r sig bygger han upp momentum. Han kan fĂĄ upp till 10 momentum efter att ha sprungit i 10 turer, men fĂ¶rlorar det snabbt om han slutar rĂ¶ra sig. FrilĂ¶paren kan anvĂ¤nda sin fart fĂ¶r att bĂ¶rja frilĂ¶pning, 2 turer per fartpoĂ¤ng.\n\nNĂ¤r han frilĂ¶per rĂ¶r sig FrilĂ¶paren med 2x hastighet och fĂĄr bonus undvikande i proportion till sin nivĂĄ. NĂ¤r frilĂ¶pningen slutar finns det en nedkylningstid innan fart kan byggas upp igen.
actors.hero.herosubclass.sniper=krypskytt
actors.hero.herosubclass.sniper_short_desc=Skytten kan genomtrĂ¤nga rustning med sina avstĂĄndsattacker. Hon kan Ă¤ven fĂ¶lja upp med en speciell attack frĂĄn sin pilbĂĄge efter en trĂ¤ff med kastvapen.
actors.hero.herosubclass.sniper_desc=Snipern Ă¤r en mĂ¤stare pĂĄ distansstrid, vars distansattacker genomtrĂ¤nger fiendens rustning. NĂ¤r hon attackerar en fiende med ett kastvapen placerar hon en prickskyttemĂ¤rke pĂĄ dem, vilket lĂĄter henne fĂ¶lja upp med en specialattack frĂĄn sin bĂĄge. Denna specialattack varierar beroende pĂĄ hur hennes bĂĄge Ă¤r fĂ¶rstĂ¤rkt. En ofĂ¶rstĂ¤rkt bĂĄge avfyrar ett skott som gĂ¶r mindre skada men avfyras omedelbart. En snabb bĂĄge avfyrar en salva med tre pilar som gĂ¶r mindre skada, men som fortfarande kan aktivera fĂ¶rtrollningar och tar 1 tur att avfyra. En skadebĂĄge avfyrar ett prickskott som garanterat trĂ¤ffar, gĂ¶r bonusskada baserat pĂĄ avstĂĄnd och tar 2 turer att avfyra.
actors.hero.herosubclass.warden=vĂ¤ktare
actors.hero.herosubclass.warden_short_desc=_VĂ¤ktaren_ kan se genom hĂ¶gt grĂ¤s och fĂĄr bonuseffekter nĂ¤r hon planterar frĂ¶n och trampar ner vĂ¤xter.
actors.hero.herosubclass.warden_desc=VĂ¤ktaren har en stark koppling till naturen som ger henne en rad bonuseffekter relaterade till grĂ¤s och vĂ¤xter. Hon kan se genom hĂ¶gt och fuktigt grĂ¤s som om det vore tomt utrymme. \n\nVĂ¤ktaren fĂĄr grĂ¤s att gro runt alla frĂ¶n hon kastar eller planterar och fĂĄr specialeffekter nĂ¤r hon trampar pĂĄ vĂ¤xter. Dessa specialeffekter ersĂ¤tter de vanliga vĂ¤xteffekterna, vilket innebĂ¤r att inga vĂ¤xter Ă¤r skadliga fĂ¶r henne att trampa pĂĄ.
actors.hero.herosubclass.champion=kĂ¤mpe
actors.hero.herosubclass.champion_short_desc=_KĂ¤mpen_ kan anvĂ¤nda tvĂĄ vapen och fĂĄr fler vapenkontakter. Hennes vanliga attacker anvĂ¤nder hennes primĂ¤ra vapen, men hon kan byta vapen och anvĂ¤nda bĂĄda vapnens fĂ¶rmĂĄgor.
actors.hero.herosubclass.champion_desc=KĂ¤mpen Ă¤r en mĂ¤stare pĂĄ nĂ¤rstridsvapen som kan utrusta sig med ett sekundĂ¤rt vapen utĂ¶ver sitt primĂ¤ra. Hennes vanliga attacker anvĂ¤nder hennes primĂ¤ra vapen, men hon kan byta primĂ¤rt vapen direkt och anvĂ¤nda bĂĄda vapnens fĂ¶rmĂĄgor.
actors.hero.herosubclass.monk=munk
actors.hero.herosubclass.monk_short_desc=_Munken_ samlar energi under strid. Denna energi kan anvĂ¤ndas till en rad olika unika fĂ¶rmĂĄgor.
actors.hero.herosubclass.monk_desc=Munken Ă¤r en mĂ¤stare pĂĄ fysisk teknik. NĂ¤r hon besegrar fiender fĂĄr hon energi som kan anvĂ¤ndas till en rad olika defensiva och anvĂ¤ndbara fĂ¶rmĂĄgor. Denna energi fĂ¶rsvinner inte med tiden, men har en Ă¶vre grĂ¤ns baserad pĂĄ munkens nivĂĄ. \n\n1 energi: slĂĄ snabbt med nĂ¤varna \n2 energi: fokusera fĂ¶r att undvika nĂ¤sta attack \n3 energi: spring snabbt till nĂ¤rheten \n4 energi: sparka bort en fiende \n5 energi: meditera fĂ¶r att rensa statusar och ĂĄterstĂ¤lla trollstavens och artefaktens laddning
actors.hero.herosubclass.priest=prĂ¤st
actors.hero.herosubclass.priest_short_desc=PrĂ¤sten fĂĄr nya lĂĄngdistansbesvĂ¤rjelser och en fĂ¶rstĂ¤rkt version av vĂ¤gledande ljus.
