actors.hero.talent.soul_eater.desc=_+1:_ SjĂ¤lsmĂ¤rke ger _0,33 turer_ mĂ¤ttnad fĂ¶r varje fysisk skada som tillfogas. Fiender med sjĂ¤lsmĂ¤rke har _10% chans_ att utlĂ¶sa effekter vid intag nĂ¤r de dĂ¶r.\n\n_+2:_ SjĂ¤lsmĂ¤rke ger _0,67 turer_ mĂ¤ttnad fĂ¶r varje fysisk skada som tillfogas. SjĂ¤lsmĂ¤rkta fiender har _20% chans_ att utlĂ¶sa effekter nĂ¤r de dĂ¶r. \n\n_+3:_ SjĂ¤lsmĂ¤rke ger _1 tur_ mĂ¤ttnad fĂ¶r varje fysisk skada som orsakas. SjĂ¤lsmĂ¤rkta fiender har _30% chans_ att utlĂ¶sa effekter nĂ¤r de dĂ¶r.
