actors.mobs.npcs.imp.intro=Ă„r du en Ă¤ventyrare? Jag Ă¤lskar Ă¤ventyrare! Man kan alltid lita pĂĄ dem om nĂĄgot behĂ¶ver dĂ¶das, eller hur? Mot en belĂ¶ning fĂ¶rstĂĄs ;)
actors.mobs.npcs.imp.golems_1=I mitt fall Ă¤r det _golems_ som mĂĄste dĂ¶das. Du fĂ¶rstĂĄr, jag ska starta en liten verksamhet hĂ¤r, men de dĂ¤r dumma golems Ă¤r dĂĄliga fĂ¶r affĂ¤rerna! Det Ă¤r vĂ¤ldigt svĂĄrt att fĂ¶rhandla med vandrande granitklumpar, fĂ¶rbaskade varelser! SĂĄ snĂ¤lla, dĂ¶da... lĂĄt oss sĂ¤ga _4 av dem_ sĂĄ fĂĄr du en belĂ¶ning.
actors.mobs.npcs.imp.monks_1=I mitt fall Ă¤r det _munkar_ som mĂĄste dĂ¶das. Du fĂ¶rstĂĄr, jag ska starta en liten verksamhet hĂ¤r, men de dĂ¤r galningarna kĂ¶per ingenting sjĂ¤lva och skrĂ¤mmer bort andra kunder. SĂĄ snĂ¤lla, dĂ¶da... lĂĄt oss sĂ¤ga _5 av dem_, sĂĄ fĂĄr du en belĂ¶ning.
