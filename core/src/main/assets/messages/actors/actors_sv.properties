actors.hero.herosubclass.paladin_desc=Paladinen fĂĄr en rad nya och uppgraderade trollformler som betonar nĂ¤rstrid och synergi med vapen och rustningar.\n\nPaladinens trollformler _Holy Weapon_ och _Holy Ward_ ger stĂ¶rre bonusar, ĂĄsidosĂ¤tter inte lĂ¤ngre befintliga fĂ¶rtrollningar och glyfer och kan fĂ¶rlĂ¤ngas genom att kasta andra trollformler.\n\nPaladinen fĂĄr ocksĂĄ besvĂ¤rjelsen _Smite_, som lĂĄter dem utfĂ¶ra en garanterad nĂ¤rstridstrĂ¤ff med bonusskada och fĂ¶rtrollningskraft.

