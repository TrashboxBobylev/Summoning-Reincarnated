actors.hero.talent.feigned_retreat.title=feigned retreat
actors.hero.talent.feigned_retreat.desc=_+1:_ Om en fiende attackerar Duellantens efterbild fĂĄr hon _2 turer_ av hastighet.\n\n_+2:_ Om en fiende attackerar Duellantens efterbild fĂĄr hon _4 turer_ av hastighet.\n\n_+3:_ Om en fiende attackerar Duellantens efterbild fĂĄr hon _6 turer_ av hastighet.\n\n_+4:_ Om en fiende attackerar Duellantens efterbild fĂĄr hon _8 turer_ av hastighet.
