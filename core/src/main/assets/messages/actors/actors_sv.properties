actors.hero.talent.runic_transference.meta_desc=_Om denna talang erhĂĄlls av en annan hjĂ¤lte_ kommer den istĂ¤llet att hjĂ¤lpa glyfer pĂĄ din rustning att motstĂĄ att tas bort av uppgraderingsrullar. Glyfer bĂ¶rjar gĂĄ fĂ¶rlorade nĂ¤r du uppgraderar frĂĄn nivĂĄ 6 (upp frĂĄn 4) vid +1 eller nivĂĄ 7 (upp frĂĄn 4) vid +2. NivĂĄn dĂ¤r glyfer garanterat gĂĄr fĂ¶rlorade Ă¤r ofĂ¶rĂ¤ndrad vid +8.
