actors.hero.spells.spiritform.name=andeform
actors.hero.spells.spiritform.short_desc=Tilldelar treenigheten en ring eller artefakt.
actors.hero.spells.spiritform.desc=PrĂ¤sten vĂ¤ljer en ring eller artefakt som de har identifierat under denna omgĂĄng (utom den heliga boken) och fĂ¶rser treenigheten med dess effekt.\n\nOm en ring vĂ¤ljs, ger treenigheten ringens effekt med +%1$d i 20 turer.\n\nOm en artefakt vĂ¤ljs, replikerar Trinity den artefaktens effekt med +%2$d. Varje artefakt har olika specifika beteenden och rustningskostnader nĂ¤r den anvĂ¤nds med Trinity.\n\nDenna besvĂ¤rjelse ersĂ¤tter alla andra andeeffekter som treenigheten fĂ¶r nĂ¤rvarande Ă¤r fĂ¶rse
actors.hero.spells.spiritform$spiritformbuff.name=andeform
actors.hero.spells.spiritform$spiritformbuff.desc=Treenighetens andeform ger dig fĂ¶r nĂ¤rvarande kraften frĂĄn ett fĂ¶remĂĄl, som om du hade det utrustat.\n\nObservera att andeform inte kan ge dig ytterligare en kopia av en effekt som du redan har nytta av.\n\nNuvarande effekt: %1$s.\n\nĂ…terstĂĄende turer: %2$s.

actors.hero.spells.smite.name=smite
actors.hero.spells.smite.short_desc=Garanterar en trĂ¤ff med bonusskada och fĂ¶rtrollningskraft.
actors.hero.spells.smite.desc=Paladinen infunderar en nĂ¤rstridsattack med rĂ¤ttfĂ¤rdig fĂ¶rstĂ¶relsekraft.n\nFĂ¶rutom att orsaka normal nĂ¤rstridsskada gĂ¶r Smite att icke-belastade attacker garanterat trĂ¤ffar, har +300%% fĂ¶rtrollningskraft och orsakar %1$d - %2$d bonusmagisk skada.\n\nSmites bonusmagiska skada skalar med Paladins nivĂĄ och orsakar alltid maximal bonusmagisk skada mot odĂ¶da eller demoniska fiender.

actors.hero.spells.stasis.name=stasis
actors.hero.spells.stasis.short_desc=Tar bort allierade frĂĄn fĂ¤ngelsehĂĄlan och bevarar dem.
actors.hero.spells.stasis.desc=PrĂ¤sten fokuserar sin koppling till sin allierade mot sig sjĂ¤lv, vilket gĂ¶r att allierade tillfĂ¤lligt hĂĄlls i en sorts energistasis inom prĂ¤sten. Allierade bevaras i upp till %d turer, och alla positiva effekter pĂĄ dem pĂĄverkas inte av tiden i stasis. \n\nAllierade visas bredvid prĂ¤sten nĂ¤r stasis upphĂ¶r naturligt, eller sĂĄ kan prĂ¤sten omedelbart ĂĄteranvĂ¤nda fĂ¶rtrollningen utan kostnad fĂ¶r att avsluta effekten i fĂ¶rtid. Stasis kan Ă¤ven flytta orĂ¶rliga allierade, men kan inte flytta dem mellan vĂĄningar.
actors.hero.spells.stasis$stasisbuff.name=ally in stasis
actors.hero.spells.stasis$stasisbuff.left_behind=Din orĂ¶rliga allierade blir kvar.
actors.hero.spells.stasis$stasisbuff.desc=PrĂ¤sten har fĂ¶r nĂ¤rvarande en allierad lagrad i stasis. Alla positiva effekter pĂĄ denna allierade bevaras, inklusive Power of Many, och de ĂĄterkommer bredvid prĂ¤sten nĂ¤r effekten upphĂ¶r. Effekten kan ocksĂĄ avslutas i fĂ¶rtid genom att Stasis kastas igen. \n\nAllierad i stasis: %1$s. \nĂ…terstĂĄende turer: %2$s.

actors.hero.spells.sunray.name=sunray
actors.hero.spells.sunray.short_desc=Orsakar magisk skada pĂĄ avstĂĄnd och blĂ¤ndar ett mĂĄl en gĂĄng.
actors.hero.spells.sunray.desc=PrĂ¤sten avfyrar en blĂ¤ndande ljusstrĂĄle mot ett mĂĄl, som orsakar %1$d-%2$d skada och fĂ¶rblindar mĂĄlet i %3$d turer. Sunray orsakar alltid maximal skada pĂĄ odĂ¶da och demoniska mĂĄl. \n\nEfter att ha trĂ¤ffats av denna besvĂ¤rjelse anpassar fiendens syn, vilket fĂ¶rhindrar att de blĂ¤ndas av den igen. Om de dock trĂ¤ffas igen vid blindhet orsakad av denna besvĂ¤rjelse blir ljuset Ă¶vervĂ¤ldigande och fĂ¶rlamar dem istĂ¤llet.

actors.hero.spells.walloflight.name=ljusvĂ¤gg
actors.hero.spells.walloflight.short_desc=Skapar en vĂ¤gg som blockerar fiender.
actors.hero.spells.walloflight.desc=Paladinen skapar en vĂ¤gg av solida ljuspaneler direkt framfĂ¶r sig som Ă¤r 1 ruta tjock, %1$d rutor bred och varar i 20 turer.\n\nDenna vĂ¤gg fungerar precis som en vanlig vĂ¤gg, fĂ¶rutom att man kan se igenom den. Fiender som fastnar i vĂ¤ggen nĂ¤r den skapas blir tillfĂ¤lligt bedĂ¶vade och trycks tillbaka om mĂ¶jligt. Allt som fastnar i vĂ¤ggen kan rĂ¶ra sig ut ur den.\n\nVĂ¤ggen kan kastas i nĂĄgon av de fyra huvudriktningarna eller de fyra diagonala riktningarna. Om en vĂ¤gg redan Ă¤r aktiv kan fĂ¶rtrollningen anvĂ¤ndas igen gratis fĂ¶r att omedelbart rensa vĂ¤ggen.
actors.hero.spells.walloflight.early_end=Du upplĂ¶ser ljusvĂ¤ggen.
actors.hero.spells.walloflight$lightwall.desc=Skinnande ljuspaneler blockerar passagen hĂ¤r.

