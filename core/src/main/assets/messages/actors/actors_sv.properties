actors.hero.talent.deathly_durability.desc=_+1:_ Fiender som dĂ¶das av dĂ¶dstecken ger Skurken en skĂ¶ld som motsvarar _13 %_ av deras hp nĂ¤r de var mĂ¤rkta.\n\n_+2:_ Fiender som dĂ¶das av dĂ¶dstecken ger Skurken en skĂ¶ld som motsvarar _25%_ av deras hp nĂ¤r de var mĂ¤rkta.\n\n_+3:_ Fiender som dĂ¶das av dĂ¶dsmĂ¤rket ger Skurken en skĂ¶ld som motsvarar _38%_ av deras hp nĂ¤r de var mĂ¤rkta.\n\n_+4:_ Fiender som dĂ¶das av dĂ¶dsmĂ¤rket ger Skurken en skĂ¶ld som motsvarar _50%_ av deras hp nĂ¤r de var mĂ¤rkta.
