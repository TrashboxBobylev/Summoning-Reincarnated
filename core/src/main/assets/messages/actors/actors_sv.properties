actors.hero.talent.strengthening_meal.title=stĂ¤rkande mĂĄltid
actors.hero.talent.strengthening_meal.desc=_+1:_ Att Ă¤ta mat ger Duellanten 3 bonusskada de nĂ¤sta _2 gĂĄngerna_ hon trĂ¤ffar en fiende med en fysisk attack.\n\n_+2:_ Att Ă¤ta mat ger Duellanten 3 bonusskada de nĂ¤sta _3 gĂĄngerna_ hon trĂ¤ffar en fiende med en fysisk attack.
actors.hero.talent.adventurers_intuition.title=Ă¤ventyrares intuition
actors.hero.talent.adventurers_intuition.desc=_+1:_ Duellanten identifierar vapen _2,5 gĂĄnger snabbare_ och rustningar _1,75 gĂĄnger snabbare_. \n\n_+2:_ Duellanten identifierar vapen _nĂ¤r hon utrustar sig med dem_ och rustningar _2,5 gĂĄnger snabbare_.
actors.hero.talent.patient_strike.title=tĂĄlmodigt slag
actors.hero.talent.patient_strike.desc=_+1:_ Om Duellanten vĂ¤ntar innan hon utfĂ¶r en nĂ¤rstridsattack, gĂ¶r hon _1-2 bonusskada_.\n\n_+2:_ Om Duellanten vĂ¤ntar innan hon utfĂ¶r en nĂ¤rstridsattack, gĂ¶r hon _2 bonusskada_.
actors.hero.talent.aggressive_barrier.title=aggressiv barriĂ¤r
actors.hero.talent.aggressive_barrier.desc=_+1:_ Duellanten fĂĄr _3 skĂ¶ld_ nĂ¤r hon anvĂ¤nder en vapenfĂ¶rmĂĄga och har 50% eller mindre hĂ¤lsa.\n\n_+2:_ Duellanten fĂĄr _5 skĂ¶ld_ nĂ¤r hon anvĂ¤nder en vapenfĂ¶rmĂĄga och har 50% eller mindre hĂ¤lsa.
actors.hero.talent.aggressive_barrier.meta_desc=_Om denna talang erhĂĄlls av en annan hjĂ¤lte_ kommer den istĂ¤llet att ge skĂ¶ld nĂ¤r en nĂ¤rstridsattack utfĂ¶rs vid lĂĄg hĂ¤lsa, med en nedkylningstid pĂĄ 50 turer.

actors.hero.talent.focused_meal.title=fokuserad mĂĄltid
actors.hero.talent.focused_meal.desc=_+1:_ Att Ă¤ta mat tar 1 tur fĂ¶r Duellanten och ger henne _0,67 laddningar_ pĂĄ hennes vapen.\n\n_+2:_ Att Ă¤ta mat tar 1 tur fĂ¶r Duellanten och ger henne _1 laddning_ pĂĄ hennes vapen.
actors.hero.talent.focused_meal.meta_desc=_Om denna talang erhĂĄlls av en annan hjĂ¤lte_ ger den istĂ¤llet bonusskada till deras nĂ¤sta trĂ¤ff motsvarande deras nivĂĄ/3 vid +1, eller nivĂĄ/2 vid +2.
actors.hero.talent.liquid_agility.title=flytande smidighet
actors.hero.talent.liquid_agility.desc=_+1:_ NĂ¤r du dricker eller kastar en dryck, brygd eller elixir fĂĄr Duellanten _3x undvikande_ och _3x trĂ¤ffsĂ¤kerhet_ pĂĄ din nĂ¤sta nĂ¤rstridsattack inom 5 turer.n\n_+2:_ NĂ¤r du dricker eller kastar en dryck, brygd eller elixir fĂĄr Duellanten _oĂ¤ndlig undvikande_ och _oĂ¤ndlig trĂ¤ffsĂ¤kerhet_ pĂĄ din nĂ¤sta nĂ¤rstridsattack inom 5 turer.\n\nDenna bonus varar i ytterligare en tur och attack nĂ¤r du anvĂ¤nder styrkedrycker, erfarenhetsdrycker eller alkemiprodukter som mĂĄste tillverkas med hjĂ¤lp av dessa drycker.\n\nFĂ¶r alkemiprodukter med hĂ¶gre utgĂĄngsmĂ¤ngd (t.ex. vattenbrygd) har denna talang en chans att aktiveras baserat pĂĄ hur mĂĄnga av den produkten som tillverkas.
actors.hero.talent.weapon_recharging.title=vapenuppladdning
actors.hero.talent.weapon_recharging.desc=_+1:_ Duellanten fĂĄr en vapenladdning var 15:e tur nĂ¤r han Ă¤r under pĂĄverkan av buffar som laddar trollstavar eller artefakter.\n\n_+2:_ Duellanten fĂĄr en vapenladdning var 10:e tur nĂ¤r han Ă¤r under pĂĄverkan av buffar som laddar trollstavar eller artefakter.
actors.hero.talent.weapon_recharging.meta_desc=_Om denna talang erhĂĄlls av en annan hjĂ¤lte_ kommer den istĂ¤llet att orsaka +5 % nĂ¤rstridsskada vid +1, eller +7,5 % nĂ¤rstridsskada vid +2.
actors.hero.talent.lethal_haste.title=dĂ¶dlig hast
actors.hero.talent.lethal_haste.desc=_+1:_ NĂ¤r Duellanten landar ett dĂ¶dande slag pĂĄ en fiende med en vapenfĂ¶rmĂĄga fĂĄr hon _3 turer_ omedelbar rĂ¶relse.\n\n_+2:_ NĂ¤r Duellanten landar ett dĂ¶dande slag pĂĄ en fiende med en vapenfĂ¶rmĂĄga fĂĄr hon _5 turer_ omedelbar rĂ¶relse.
actors.hero.talent.lethal_haste.meta_desc=_Om denna talang erhĂĄlls av en annan hjĂ¤lte_ kommer den istĂ¤llet att aktiveras vid vanliga vapenattacker, med en nedkylningstid pĂĄ 100 turer.
actors.hero.talent.swift_equip.title=kvick utrustning
actors.hero.talent.swift_equip.desc=_+1:_ Duellanten kan byta sitt utrustade vapen omedelbart _en gĂĄng_ var 20:e tur.\n\n_+2:_ Duellanten kan byta sitt utrustade vapen omedelbart _tvĂĄ gĂĄnger_ var 20:e tur.\n\nOm Duellanten har denna talang och den inte Ă¤r pĂĄ cooldown, kommer ett snabbt anvĂ¤ndande av ett orustat vapen att rusta det.

actors.hero.talent.precise_assault.title=precis attack
actors.hero.talent.precise_assault.desc=_+1:_ NĂ¤r Duellanten anvĂ¤nder en vapenfĂ¶rmĂĄga fĂĄr hon _2x precision_ pĂĄ sin nĂ¤sta nĂ¤rstridsattack inom 5 turer.n\n_+2:_ NĂ¤r Duellanten anvĂ¤nder en vapenfĂ¶rmĂĄga fĂĄr hon _5x precision_ pĂĄ sin nĂ¤sta nĂ¤rstridsattack inom 5 turer.\n\n_+3:_ NĂ¤r Duellanten anvĂ¤nder en vapenfĂ¶rmĂĄga fĂĄr hon _oĂ¤ndlig precision_ pĂĄ sin nĂ¤sta nĂ¤rstridsattack inom 5 turer.
actors.hero.talent.precise_assault.meta_desc=_Om denna talang erhĂĄlls av en annan hjĂ¤lte_ Ă¶kar istĂ¤llet nĂ¤rstrids precisionen med 10% vid +1, 20% vid +2 eller 30% vid +3.
