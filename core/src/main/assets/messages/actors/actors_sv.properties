actors.hero.talent.deadly_followup.desc=_+1:_ NĂ¤r Duellanten trĂ¤ffar en fiende med ett kastvapen, gĂ¶r hon _10% mer nĂ¤rstridsskada_ pĂĄ dem i 5 turer.\n\n_+2:_ NĂ¤r Duellanten trĂ¤ffar en fiende med ett kastvapen, gĂ¶r hon _20% mer nĂ¤rstridsskada_ pĂĄ dem i 5 turer.\n\n_+3:_ NĂ¤r Duellanten trĂ¤ffar en fiende med ett kastvapen, gĂ¶r hon _30% mer nĂ¤rstridsskada_ pĂĄ dem i 5 turer.

actors.hero.talent.varied_charge.title=varied charge
actors.hero.talent.varied_charge.desc=_+1:_ KĂ¤mpen ĂĄterfĂĄr omedelbart _0,17 vapenladdningar_ nĂ¤r hon anvĂ¤nder tvĂĄ olika vapenfĂ¶rmĂĄgor, utan tidsbegrĂ¤nsning.\n\n_+2:_ KĂ¤mpen ĂĄterfĂĄr omedelbart _0,33 vapenladdningar_ nĂ¤r hon anvĂ¤nder tvĂĄ olika vapenfĂ¶rmĂĄgor, utan tidsbegrĂ¤nsning.\n\n_+3:_ KĂ¤mpen ĂĄterfĂĄr omedelbart _0,5 vapenladdningar_ nĂ¤r hon anvĂ¤nder tvĂĄ olika vapenfĂ¶rmĂĄgor, utan tidsbegrĂ¤nsning.
actors.hero.talent.twin_upgrades.title=tvillinguppgraderingar
actors.hero.talent.twin_upgrades.desc=_+1:_ Om ett av kĂ¤mpens tvĂĄ utrustade vapen har en lĂ¤gre nivĂĄ och Ă¤r _2 eller fler nivĂĄer lĂ¤gre_ Ă¤n det andra vapnet, kommer det att uppgraderas till det andra vapnets nivĂĄ.n\n_+2:_ Om ett av kĂ¤mpens tvĂĄ utrustade vapen har en lĂ¤gre nivĂĄ och Ă¤r _1 eller fler nivĂĄer lĂ¤gre_ Ă¤n det andra vapnet, kommer det att uppgraderas till det andra vapnets nivĂĄ.\n\n_+3:_ Om ett av kĂ¤mpens tvĂĄ utrustade vapen har en lĂ¤gre nivĂĄ och Ă¤r _samma nivĂĄ eller lĂ¤gre_ Ă¤n det andra vapnet, kommer det att uppgraderas till det andra vapnets nivĂĄ.
actors.hero.talent.combined_lethality.title=kombinerad dĂ¶dlighet
actors.hero.talent.combined_lethality.desc=_+1:_ Om kĂ¤mpen attackerar med ett nĂ¤rstridsvapen omedelbart efter att ha anvĂ¤nt ett annat vapens fĂ¶rmĂĄga, kommer den attacken att avrĂ¤tta alla fiender som inte Ă¤r bossar och som har _mindre Ă¤n 13 % HP_ kvar.n\n_+2:_ Om kĂ¤mpen attackerar med ett nĂ¤rstridsvapen direkt efter att ha anvĂ¤nt en annan vapens fĂ¶rmĂĄga, kommer den attacken att avliva alla fiender som inte Ă¤r bossar och som har _mindre Ă¤n 27 % HP_.\n\n_+3:_ Om kĂ¤mpen attackerar med ett nĂ¤rstridsvapen direkt efter att ha anvĂ¤nt en annan vapens fĂ¶rmĂĄga, kommer den attacken att avliva alla fiender som inte Ă¤r bossar och som har _mindre Ă¤n 40% HP_.\n\nDenna attack kan vara en vanlig nĂ¤rstridsvapenattack eller en del av en vapenfunktion.

actors.hero.talent.unencumbered_spirit.title=obehindrad ande
actors.hero.talent.unencumbered_spirit.desc=_+1:_ Munken fĂĄr _50% mer energi_ fĂ¶r varje utrustningsdel av _nivĂĄ 3 eller lĂ¤gre_ som hon anvĂ¤nder.\n\n_+2:_ Munken fĂĄr _75% mer energi_ fĂ¶r varje utrustningsdel av _nivĂĄ 2 eller lĂ¤gre_ som hon anvĂ¤nder. FĂ¶rdelen med nivĂĄ 3 Ă¤r ofĂ¶rĂ¤ndrad.\n\n_+3:_ Munken fĂĄr _100% mer energi_ fĂ¶r varje utrustningsdel av _nivĂĄ 1 eller lĂ¤gre_ som hon anvĂ¤nder. FĂ¶rdelarna med nivĂĄ 2 och 3 Ă¤r ofĂ¶rĂ¤ndrade. Hon fĂĄr ocksĂĄ en gratis tygrustning och spikhandskar.\n\nObservera att denna talang inte ger nĂĄgon fĂ¶rdel om du Ă¤r obevĂ¤pnad eller attackerar med en Ring of Force.
actors.hero.talent.monastic_vigor.title=monastic vigor
actors.hero.talent.monastic_vigor.desc=_+1:_ Om munken har _100% energi_ blir hennes fĂ¶rmĂĄgor fĂ¶rstĂ¤rkta.\n\n_+2:_ Om munken har _80% eller mer energi_ blir hennes fĂ¶rmĂĄgor fĂ¶rstĂ¤rkta.\n\n_+3:_ Om munken har _60% eller mer energi_ blir hennes fĂ¶rmĂĄgor fĂ¶rstĂ¤rkta.\n\nNĂ¤r fĂ¶rstĂ¤rkt:\n- Flurry tillĂ¤mpar ditt vapens fĂ¶rtrollning\n- Fokus Ă¤r omedelbar\n- Dash fĂĄr +4 rĂ¤ckvidd\n- Dragon Kick gĂ¶r +50% skada och tillĂ¤mpar sin knockback- och bedĂ¶vningseffekt pĂĄ alla intilliggande fiender\n- Meditate lĂ¤ker lĂĄngsamt 20% av saknad HP och ger 80% skaderesistens.
actors.hero.talent.combined_energy.title=kombinerad energi
actors.hero.talent.combined_energy.desc=_+1:_ Om munken anvĂ¤nder en vapenfĂ¶rmĂĄga och en _4+ energi_fĂ¶rmĂĄga inom 5 turer efter varandra ĂĄterfĂĄr hon 1 fĂ¶rbrukad energi.\n\n_+2:_ Om munken anvĂ¤nder en vapenfĂ¶rmĂĄga och en _3+ energi_fĂ¶rmĂĄga inom 5 turer efter varandra ĂĄterfĂĄr hon 1 fĂ¶rbrukad energi.\n\n_+3:_ Om munken anvĂ¤nder en vapenfĂ¶rmĂĄga och en _2+ energi_fĂ¶rmĂĄga inom 5 turer efter varandra, ĂĄterfĂĄr hon 1 fĂ¶rbrukad energi.

actors.hero.talent.close_the_gap.title=close the gap
actors.hero.talent.close_the_gap.desc=_+1:_ Duellanten blinkar _upp till tvĂĄ rutor_ mot sitt mĂĄl nĂ¤r hon startar en duell.\n\n_+2:_ Duellanten blinkar _upp till tre rutor_ mot sitt mĂĄl nĂ¤r hon startar en duell.\n\n_+3:_ Duellanten blinkar _upp till fyra rutor_ mot sitt mĂĄl nĂ¤r hon startar en duell.\n\n_+4:_ Duellanten blinkar _upp till fem rutor_ mot sitt mĂĄl nĂ¤r hon startar en duell.\n\nDenna blinkning kan passera hinder och fiender, men inte fast terrĂ¤ng som vĂ¤ggar. Blinkningen tas med i berĂ¤kningen nĂ¤r det avgĂ¶rs om en fiende Ă¤r inom rĂ¤ckhĂĄll fĂ¶r att utmanas.
actors.hero.talent.invigorating_victory.title=invigorating victory
actors.hero.talent.invigorating_victory.desc=_+1:_ Om Duellanten besegrar sitt mĂĄl innan duellen Ă¤r Ă¶ver, lĂ¤ker hon _5 HP plus 30% av skadan_ hon tog under duellen.n\n\n_+2:_ Om Duellanten besegrar sitt mĂĄl innan duellen Ă¤r Ă¶ver, lĂ¤ker hon _10 HP plus 50% av skadan_ hon tog under duellen.\n\n_+3:_ Om Duellanten besegrar sitt mĂĄl innan duellen Ă¤r Ă¶ver, lĂ¤ker hon _15 HP plus 65% av skadan_ hon tog under duellen.n\n\n_+4:_ Om Duellanten besegrar sitt mĂĄl innan duellen Ă¤r Ă¶ver, lĂ¤ker hon _20 HP plus 75% av den skada_ hon ĂĄsamkats under duellen.
actors.hero.talent.elimination_match.title=eliminationsmatch
actors.hero.talent.elimination_match.desc=_+1:_ Om Duellanten utmanar igen inom 3 turer efter att en duell har avslutats, har den utmaningen en _16 % reducerad_ laddningskostnad.\n\n_+2:_ Om Duellanten utmanar igen inom 3 turer efter att en duell har avslutats, har den utmaningen en _30% reducerad_ laddningskostnad.\n\n_+3:_ Om Duellanten utmanar igen inom 3 turer efter att en duell har avslutats, har den utmaningen en _40% reducerad_ laddningskostnad.\n\n_+4:_ Om Duellanten utmanar igen inom 3 turer efter att en duell har avslutats, har den utmaningen en _50% reducerad_ laddningskostnad.

actors.hero.talent.elemental_reach.title=elementĂ¤r rĂ¤ckvidd
