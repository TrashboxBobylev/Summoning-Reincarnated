actors.mobs.npcs.ghost.gnoll_2=SnĂ¤lla... HjĂ¤lp mig... DĂ¶da trickstern...\n\n_LĂĄt den inte trĂ¤ffa dig... GĂĄ nĂ¤ra den..._
actors.mobs.npcs.ghost.crab_1=Hej %s... En gĂĄng var jag som du â€“ stark och sjĂ¤lvsĂ¤ker... Men jag blev dĂ¶dad av en urĂĄldrig varelse... Jag kan inte lĂ¤mna denna plats... Inte fĂ¶rrĂ¤n jag har hĂ¤mnats... DĂ¶da den _stora krabban_ som tog mitt liv...\n\nDen Ă¤r onaturligt gammal... Med en enorm klor och ett tjockt skal... _Akta dig fĂ¶r dess klor, du mĂĄste Ă¶verraska krabban annars blockerar den med dem..._
