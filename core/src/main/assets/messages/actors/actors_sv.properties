actors.hero.talent.fan_of_blades.desc=_+1:_ Spektrala blad kan trĂ¤ffa upp till _1 ytterligare mĂĄl_ fĂ¶r 50% skada. MĂĄlet mĂĄste vara synligt och inom en _30 graders_ konformad AOE.\n\n_+2:_ Spektrala blad kan trĂ¤ffa upp till _2 ytterligare mĂĄl_ fĂ¶r 50% skada. MĂĄlen mĂĄste vara synliga och inom en _60 graders_ konformad AOE.\n\n_+3:_ Spektrala blad kan trĂ¤ffa upp till _3 ytterligare mĂĄl_ fĂ¶r 50% skada. MĂĄlen mĂĄste vara synliga och befinna sig inom en _90 graders_ konformig AOE. \n\n_+4:_ Spektrala blad kan trĂ¤ffa upp till _4 ytterligare mĂĄl_ fĂ¶r 50% skada. MĂĄlen mĂĄste vara synliga och befinna sig inom en _120 graders_ konformig AOE.
actors.hero.talent.projecting_blades.title=framskjutande klingor
actors.hero.talent.projecting_blades.desc=_+1:_ Spektrala blad har _+25% trĂ¤ffsĂ¤kerhet_ och kan trĂ¤nga igenom upp till _2 solida rutor_.\n\n_+2:_ Spektrala blad har _+50% trĂ¤ffsĂ¤kerhet_ och kan trĂ¤nga igenom upp till _4 solida rutor_.\n\n_+3:_ Spektrala blad har _+75% trĂ¤ffsĂ¤kerhet_ och kan trĂ¤nga igenom upp till _6 solida rutor_.\n\n_+4:_ Spektrala blad har _+100% trĂ¤ffsĂ¤kerhet_ och kan trĂ¤nga igenom upp till _8 solida rutor_.
actors.hero.talent.spirit_blades.title=spirit blades
actors.hero.talent.spirit_blades.desc=_+1:_ Spektralblad har _30% chans_ att Ă¤ven anvĂ¤nda fĂ¶rtrollningen pĂĄ andebĂĄgen.\n\n_+2:_ Spektralblad har _60% chans_ att Ă¤ven anvĂ¤nda fĂ¶rtrollningen pĂĄ andebĂĄgen.\n\n_+3:_ Spektralblad har _90% chans_ att Ă¤ven anvĂ¤nda fĂ¶rtrollningen pĂĄ andebĂĄgen.\n\n_+4:_ Spektralblad har _100% chans_ att Ă¤ven anvĂ¤nda fĂ¶rtrollningen pĂĄ andebĂĄgen, och den ger varje fĂ¶rtrollning _+10% kraft_.

actors.hero.talent.growing_power.title=vĂ¤xande kraft
actors.hero.talent.growing_power.desc=_+1:_ Attack- och rĂ¶relsehastighetsfĂ¶rstĂ¤rkningarna frĂĄn naturens kraft Ă¶kas till _38% och 125%_, frĂĄn 33 % och 100%.\n\n_+2:_ Attack- och rĂ¶relsehastighetsfĂ¶rstĂ¤rkningarna frĂĄn naturens kraft Ă¶kar till _42 % och 150%_, frĂĄn 33 % och 100%.\n\n_+3:_ Attack- och rĂ¶relsehastighetsfĂ¶rstĂ¤rkningarna frĂĄn naturens kraft Ă¶kas till _46 % och 175%_, frĂĄn 33 % och 100%.\n\n_+4:_ Attack- och rĂ¶relsehastighetsfĂ¶rstĂ¤rkningarna frĂĄn naturens kraft Ă¶kas till _50% och 200%_, frĂĄn 33 % och 100%.
actors.hero.talent.natures_wrath.title=naturens ilska
actors.hero.talent.natures_wrath.desc=_+1:_ Vid aktiv naturkraft har skott frĂĄn andebĂĄgen _8 % chans_ att utlĂ¶sa en slumpmĂ¤ssig skadlig vĂ¤xteffekt.\n\n_+2:_ Vid aktiv naturkraft har skott frĂĄn andebĂĄgen _17 % chans_ att utlĂ¶sa en slumpmĂ¤ssig skadlig vĂ¤xteffekt.\n\n_+3:_ Vid aktiv naturkraft har skott frĂĄn andebĂĄgen _25 % chans_ att utlĂ¶sa en slumpmĂ¤ssig skadlig vĂ¤xteffekt.\n\n_+4:_ Vid aktiv naturkraft har skott frĂĄn andebĂĄgen _33 % chans_ att utlĂ¶sa en slumpmĂ¤ssig skadlig vĂ¤xteffekt.\n\nDe vĂ¤xter som kan utlĂ¶sas Ă¤r: blindweed, firebloom, icecap, sorrowmoss och stormvine.
actors.hero.talent.wild_momentum.title=vild drivkraft
actors.hero.talent.wild_momentum.desc=_+1:_ Att dĂ¶da en fiende med andebĂĄgen fĂ¶rlĂ¤nger naturens krafts varaktighet med _1 tur_. Varaktigheten kan fĂ¶rlĂ¤ngas med max _2 turer_.\n\n_+2:_ Att dĂ¶da en fiende med andebĂĄgen fĂ¶rlĂ¤nger naturens kraft med _2 turer_. Varaktigheten kan fĂ¶rlĂ¤ngas med max _4 turer_.\n\n_+3:_ Att dĂ¶da en fiende med andebĂĄgen fĂ¶rlĂ¤nger naturens kraft med _3 turer_. Varaktigheten kan fĂ¶rlĂ¤ngas med maximalt _6 turer_. \n\n_+4:_ Att dĂ¶da en fiende med andebĂĄgen fĂ¶rlĂ¤nger naturens kraft med _4 turer_. Varaktigheten kan fĂ¶rlĂ¤ngas med maximalt _8 turer_.

actors.hero.talent.eagle_eye.title=Ă¶rnĂ¶ga
actors.hero.talent.eagle_eye.desc=_+1:_ Ande-hĂ¶kens synfĂ¤lt Ă¶kar frĂĄn 6 till _7 rutor_.\n\n_+2:_ Ande-hĂ¶kens synfĂ¤lt Ă¶kar frĂĄn 6 till _8 rutor_.n\n_+3:_ Ande-hĂ¶kens synfĂ¤lt Ă¶kar frĂĄn 6 till _9 rutor_ och den fĂĄr _2 rutor_ av tankesyn.\n\n_+4:_ Ande-hĂ¶kens synfĂ¤lt Ă¶kar frĂĄn 6 till _10 rutor_ och den fĂĄr _3 rutor_ av tankesyn.
actors.hero.talent.go_for_the_eyes.title=gĂĄ fĂ¶r Ă¶gonen
actors.hero.talent.go_for_the_eyes.desc=_+1:_ Ande-hĂ¶kens attacker fĂ¶rblindar fiender i _2 turer_.\n\n_+2:_ Ande-hĂ¶kens attacker fĂ¶rblindar fiender i _5 turer_.\n\n_+3:_ Attacker frĂĄn ande-hĂ¶k blĂ¤ndar fiender i _5 turer_ och fĂ¶rlamar dem i _2 turer_.\n\n_+4:_ Attacker frĂĄn ande-hĂ¶k blĂ¤ndar fiender i _5 turer_ och fĂ¶rlamar dem i _5 turer_.
actors.hero.talent.swift_spirit.title=snabb ande
actors.hero.talent.swift_spirit.desc=_+1:_ Ande-hĂ¶kens rĂ¶relsehastighet Ă¶kar frĂĄn 2 till _2,5 rutor_ och den undviker garanterat de fĂ¶rsta _2 attackerna_ som riktas mot den.\n\n_+2:_ Ande-hĂ¶kens rĂ¶relsehastighet Ă¶kar frĂĄn 2 till _3 rutor_, och den undviker garanterat de fĂ¶rsta _4 attackerna_ som riktas mot den.\n\n_+3:_ Ande-hĂ¶kens rĂ¶relsehastighet Ă¶kar frĂĄn 2 till _3,5 rutor_, och den undviker garanterat de fĂ¶rsta _6 attackerna_ som riktas mot den.n\n_+4:_Ande-hĂ¶kens rĂ¶relsehastighet Ă¶kas frĂĄn 2 till _4 rutor_ och den undviker garanterat de fĂ¶rsta _8 attackerna_ som riktas mot den.

