actors.hero.talent.telefrag.title=Telefrag
actors.hero.talent.telefrag.desc=_+1:_ Om Magikern teleporterar sig till en annan karaktĂ¤r gĂ¶r han _10-15 skada_ pĂĄ den, men tar ocksĂĄ _5 skada_.\n\n_+2:_ Om Magikern teleporterar sig till en annan karaktĂ¤r gĂ¶r han _20-30 skada_ pĂĄ den, men tar ocksĂĄ _10 skada_.\n\n_+3:_ Om Magikern teleporterar sig till en annan karaktĂ¤r, gĂ¶r han _30-45 skada_ pĂĄ den, men tar ocksĂĄ _15 skada_.\n\n_+4:_ Om Magikern teleporterar sig till en annan karaktĂ¤r, gĂ¶r han _40-60 skada_ pĂĄ den, men tar ocksĂĄ _20 skada_.\n\nHjĂ¤lten kan inte dĂ¶das av denna talang, sjĂ¤lvskadan kan reduceras av magiresistenta effekter.
